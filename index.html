<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro | Studio v14.9.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .pulse-ring { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://jslelyvziimqimmaxvlk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGVseXZ6aWltcWltbWF4dmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNTksImV4cCI6MjA5MzM2MTM1OX0.DdDfRZcgfNu7fFZi0uHMSBi-TUNvYVEuHMwiPHdJIa4'; // ENTER KEY
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [pulse, setPulse] = useState('online');
            const [view, setView] = useState('vault');
            const [stacks, setStacks] = useState([]);
            const [masterLibrary, setMasterLibrary] = useState({});

            useEffect(() => {
                _db.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); boot(); }
                });
            }, []);

            const boot = async () => {
                setPulse('syncing');
                const { data: cards } = await _db.from('cards').select('*');
                const { data: stacksData } = await _db.from('stacks').select('*').order('created_at', { ascending: false });
                const lib = {};
                cards?.forEach(c => lib[c.id] = c);
                setMasterLibrary(lib);
                setStacks(stacksData || []);
                setPulse('online');
            };

            const createStack = async () => {
                const name = prompt("Name of Stack:");
                if (!name || !user) return;

                setPulse('syncing');
                // The 'user_id' MUST match user.id for RLS to pass
                const { data, error } = await _db.from('stacks')
                    .insert([{ name: name, user_id: user.id }])
                    .select();

                if (error) {
                    setPulse('error');
                    alert(`Vault Refusal: ${error.message}`);
                } else {
                    setStacks([data[0], ...stacks]);
                    setPulse('online');
                }
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <button onClick={() => _db.auth.signInWithOAuth({ provider: 'google' })} className="bg-white px-10 py-5 rounded-2xl font-black uppercase text-xs">Login to Vault</button>
                </div>
            );

            return (
                <div className="p-10 md:p-20">
                    <div className="fixed bottom-10 right-10 z-[999] flex items-center gap-4 glass p-4 rounded-3xl shadow-2xl">
                        <div className="text-right">
                            <p className="text-[10px] font-black text-slate-400 uppercase">Studio Pulse</p>
                            <p className="text-xs font-bold text-slate-800 uppercase">{pulse}</p>
                        </div>
                        <div className={`w-4 h-4 rounded-full ${pulse === 'online' ? 'bg-emerald-500 pulse-ring' : 'bg-rose-500'}`}></div>
                    </div>

                    <header className="flex justify-between items-end mb-20">
                        <h1 className="text-8xl font-black italic tracking-tighter text-indigo-600">THE VAULT</h1>
                        <button onClick={createStack} className="bg-slate-900 text-white px-12 py-5 rounded-full font-black text-xs uppercase">+ NEW STACK</button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                        {stacks.map(s => (
                            <div key={s.id} className="bg-white p-16 rounded-[4rem] border border-slate-100 shadow-sm relative group">
                                <h2 className="text-3xl font-black uppercase tracking-tighter text-slate-800">{s.name}</h2>
                                <button onClick={() => _db.from('stacks').delete().eq('id', s.id).then(boot)} className="absolute top-10 right-10 text-slate-200 hover:text-rose-500 font-bold opacity-0 group-hover:opacity-100 transition-all">Delete</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
