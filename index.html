<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Studio Cloud Pro (Fixed Upload)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // !!! INSERT YOUR GOOGLE KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCpRGr-L5zFJDksK6yT2KHxIlRgm6Daaz0';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [deck, setDeck] = useState([]);
            const [mode, setMode] = useState('edit');
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);
            const [token, setToken] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle');
            const fileInputRef = useRef(null);
            const saveTimeoutRef = useRef(null);

            // --- GOOGLE DRIVE LOGIC ---
            useEffect(() => {
                gapi.load('client', () => {
                    gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                });
            }, []);

            const login = () => {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => {
                        setToken(res.access_token);
                        loadFromDrive(res.access_token);
                    },
                });
                client.requestAccessToken();
            };

            const debouncedSave = (currentDeck) => {
                setSyncStatus('syncing');
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                saveTimeoutRef.current = setTimeout(() => saveToDrive(currentDeck), 2000);
            };

            const saveToDrive = async (currentDeck) => {
                if (!token) return;
                try {
                    const list = await gapi.client.drive.files.list({ q: "name = 'sweep_studio_data.json'" });
                    const fileId = list.result.files[0]?.id;
                    const blob = new Blob([JSON.stringify(currentDeck)], { type: 'application/json' });

                    if (fileId) {
                        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                            method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                        });
                    } else {
                        const metadata = { name: 'sweep_studio_data.json', mimeType: 'application/json' };
                        const form = new FormData();
                        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                        form.append('file', blob);
                        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                            method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                        });
                    }
                    setSyncStatus('saved');
                } catch (e) { setSyncStatus('error'); }
            };

            const loadFromDrive = async (accessToken) => {
                setIsLoading(true);
                try {
                    const list = await gapi.client.drive.files.list({ q: "name = 'sweep_studio_data.json'" });
                    const fileId = list.result.files[0]?.id;
                    if (fileId) {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        const data = await res.json();
                        if (data && Array.isArray(data)) setDeck(data);
                    }
                } catch (err) { console.error(err); }
                setIsLoading(false);
            };

            // --- APP ACTIONS ---
            const handleLiveEdit = (cardId, updates) => {
                const updatedDeck = deck.map(c => c.id === cardId ? {...c, ...updates} : c);
                setDeck(updatedDeck);
                if (mode === 'review') {
                    const updatedRows = reviewRows.map(row => row.map(card => card && card.id === cardId ? {...card, ...updates} : card));
                    setReviewRows(updatedRows);
                }
                debouncedSave(updatedDeck);
            };

            const handleSingleImageUpload = (cardId, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        handleLiveEdit(cardId, { image: ev.target.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const addCard = () => {
                const newCard = { id: Date.now()+Math.random(), header: '', description: '', image: null, showFields: { header: true, desc: true, img: true } };
                const updated = [...deck, newCard];
                setDeck(updated);
                debouncedSave(updated);
            };

            const bulkUpload = (e) => {
                const files = Array.from(e.target.files);
                setIsLoading(true);
                let processed = 0;
                const newCards = [];
                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        newCards.push({
                            id: Date.now() + Math.random(),
                            header: file.name.split('.')[0],
                            description: '',
                            image: ev.target.result,
                            showFields: { header: true, desc: true, img: true }
                        });
                        processed++;
                        if (processed === files.length) {
                            const updated = [...deck, ...newCards];
                            setDeck(updated);
                            saveToDrive(updated);
                            setIsLoading(false);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            };

            const startReview = () => {
                const rows = [];
                for (let i = 0; i < deck.length; i += 3) rows.push(deck.slice(i, i + 3));
                setReviewRows(rows);
                setCurrentRow(0);
                setMode('review');
            };

            const swap = (rowIdx, a, b) => {
                const newRows = [...reviewRows];
                const row = [...newRows[rowIdx]];
                [row[a], row[b]] = [row[b], row[a]];
                newRows[rowIdx] = row;
                setReviewRows(newRows);
            };

            const completeSweep = () => {
                const colA = [], colB = [], colC = [];
                reviewRows.forEach(row => {
                    if (row[0]) colA.push(row[0]);
                    if (row[1]) colB.push(row[1]);
                    if (row[2]) colC.push(row[2]);
                });
                const finalDeck = [...colA, ...colB, ...colC];
                setDeck(finalDeck);
                saveToDrive(finalDeck);
                setMode('edit');
            };

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full loading-spin mb-4"></div>
                    <p className="font-bold tracking-widest text-sm uppercase">Loading Cloud Deck...</p>
                </div>
            );

            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-950">
                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl text-center max-w-sm">
                        <h1 className="text-4xl font-black text-indigo-600 mb-2 italic tracking-tighter">SWEEP_STUDIO</h1>
                        <p className="text-slate-400 mb-8 font-medium">Safe permanent storage in your Google Drive.</p>
                        <button onClick={login} className="w-full bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100">Connect Drive</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <nav className="flex flex-col md:flex-row justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 gap-4">
                        <div>
                            <h1 className="text-3xl font-black text-indigo-600 italic tracking-tighter">SWEEP_STUDIO</h1>
                            <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
                                <span className={`w-2 h-2 rounded-full ${syncStatus === 'syncing' ? 'bg-amber-400 animate-ping' : 'bg-emerald-500'}`}></span>
                                {syncStatus === 'syncing' ? 'Syncing...' : `Cloud Saved: ${deck.length} Items`}
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {mode === 'edit' ? (
                                <>
                                    <button onClick={() => fileInputRef.current.click()} className="bg-slate-100 text-slate-800 px-6 py-3 rounded-xl font-bold text-sm hover:bg-slate-200">Bulk Upload</button>
                                    <button onClick={startReview} disabled={deck.length === 0} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-indigo-700 disabled:opacity-50">START REVIEW</button>
                                    <input type="file" multiple hidden ref={fileInputRef} onChange={bulkUpload} accept="image/*" />
                                </>
                            ) : (
                                <button onClick={() => setMode('edit')} className="bg-rose-500 text-white px-8 py-3 rounded-xl font-bold text-sm">EXIT</button>
                            )}
                        </div>
                    </nav>

                    {mode === 'edit' ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {deck.map(card => (
                                <div key={card.id} className="bg-white rounded-[2rem] shadow-sm border border-slate-200 flex flex-col h-[520px] overflow-hidden group">
                                    <div className="p-5 flex-1 overflow-y-auto space-y-4">
                                        <input className="w-full font-black text-lg outline-none border-b-2 border-transparent focus:border-indigo-500 pb-1" placeholder="Title..." value={card.header} onChange={e => handleLiveEdit(card.id, {header: e.target.value})} />
                                        
                                        {/* Individual Upload Area */}
                                        <label className="bg-slate-900 rounded-2xl aspect-[4/3] flex flex-col items-center justify-center overflow-hidden shadow-inner cursor-pointer hover:bg-slate-800 transition-colors relative group">
                                            {card.image ? (
                                                <img src={card.image} className="w-full h-full object-contain" />
                                            ) : (
                                                <div className="flex flex-col items-center gap-2">
                                                    <span className="text-white font-black text-[10px] uppercase tracking-widest bg-indigo-600 px-4 py-2 rounded-lg">📷 Upload Image</span>
                                                    <span className="text-slate-600 text-[9px] font-bold uppercase text-center px-4 leading-tight italic">Click here to add a photo to this card</span>
                                                </div>
                                            )}
                                            <input type="file" hidden accept="image/*" onChange={(e) => handleSingleImageUpload(card.id, e)} />
                                        </label>

                                        <textarea className="w-full h-28 text-slate-500 text-sm outline-none resize-none bg-slate-50 p-4 rounded-xl focus:bg-white border-transparent border focus:border-slate-100 font-medium" placeholder="Card notes/description..." value={card.description} onChange={e => handleLiveEdit(card.id, {description: e.target.value})} />
                                    </div>
                                    <div className="px-5 py-3 bg-slate-50 border-t flex justify-between items-center text-slate-300">
                                        <span className="text-[10px] font-black tracking-widest uppercase opacity-40">Item: {card.id.toString().slice(-4)}</span>
                                        <button onClick={() => {if(confirm('Delete card?')){const d=deck.filter(c=>c.id!==card.id); setDeck(d); saveToDrive(d);}}} className="hover:text-rose-500 transition-colors">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                        </button>
                                    </div>
                                </div>
                            ))}
                            <button onClick={addCard} className="border-4 border-dashed border-slate-200 rounded-[2.5rem] h-[520px] flex flex-col items-center justify-center text-slate-300 hover:text-indigo-500 hover:border-indigo-200 transition-all bg-white/20">
                                <span className="text-6xl font-light mb-2">+</span>
                                <span className="text-[10px] font-black uppercase tracking-widest">Add Card</span>
                            </button>
                        </div>
                    ) : (
                        <div className="max-w-6xl mx-auto space-y-10 animate-in fade-in duration-500 pb-32">
                            <div className="bg-white p-6 rounded-[2rem] flex justify-between items-center shadow-sm border border-slate-200">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">ACTIVE SESSION</p>
                                <div className="bg-indigo-600 text-white px-10 py-3 rounded-2xl font-black text-sm uppercase tracking-widest">SET {currentRow + 1} / {reviewRows.length}</div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[0, 1, 2].map(colIdx => {
                                    const card = reviewRows[currentRow]?.[colIdx];
                                    return (
                                        <div key={colIdx} className="flex flex-col gap-6">
                                            <div className="text-center font-black text-indigo-300 text-[10px] tracking-[0.5em] uppercase">COL {String.fromCharCode(65+colIdx)}</div>
                                            <div className={`flex-1 rounded-[3rem] border-4 min-h-[550px] p-8 transition-all duration-500 ${card ? 'bg-white shadow-2xl border-white' : 'bg-slate-200/40 border-dashed border-slate-200 flex items-center justify-center text-slate-300 italic text-xs'}`}>
                                                {card ? (
                                                    <div className="h-full flex flex-col">
                                                        <input className="w-full text-xl font-black mb-6 text-slate-800 outline-none bg-transparent" value={card.header} onChange={(e) => handleLiveEdit(card.id, {header: e.target.value})} />
                                                        {card.image && (
                                                            <div className="bg-slate-900 rounded-[2rem] overflow-hidden mb-6 aspect-video flex items-center justify-center shadow-inner">
                                                                <img src={card.image} className="w-full h-full object-contain" />
                                                            </div>
                                                        )}
                                                        <textarea className="flex-1 w-full text-slate-500 text-sm leading-relaxed outline-none bg-transparent resize-none font-medium" placeholder="..." value={card.description} onChange={(e) => handleLiveEdit(card.id, {description: e.target.value})} />
                                                    </div>
                                                ) : "EMPTY"}
                                            </div>
                                            {card && (
                                                <div className="flex justify-center gap-3">
                                                    <button disabled={colIdx === 0} onClick={() => swap(currentRow, colIdx, colIdx - 1)} className="bg-white px-6 py-3 rounded-2xl shadow-lg disabled:opacity-10 text-[10px] font-black active:scale-95 transition-all">← SWAP</button>
                                                    <button disabled={colIdx === 2 || !reviewRows[currentRow][colIdx + 1]} onClick={() => swap(currentRow, colIdx, colIdx + 1)} className="bg-white px-6 py-3 rounded-2xl shadow-lg disabled:opacity-10 text-[10px] font-black active:scale-95 transition-all">SWAP →</button>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>

                            <div className="flex justify-center pt-8">
                                {currentRow < reviewRows.length - 1 ? (
                                    <button onClick={() => setCurrentRow(currentRow + 1)} className="bg-indigo-600 text-white px-24 py-6 rounded-[2.5rem] font-black text-lg shadow-2xl shadow-indigo-200 active:scale-95 transition-all uppercase tracking-[0.2em]">Next Set</button>
                                ) : (
                                    <button onClick={completeSweep} className="bg-emerald-600 text-white px-24 py-6 rounded-[2.5rem] font-black text-lg shadow-2xl shadow-emerald-200 active:scale-95 transition-all uppercase tracking-[0.2em]">Sweep & Shuffle</button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
