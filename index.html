<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: Master Studio v14.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .wiki-link { cursor: pointer; color: #4f46e5; font-weight: 800; text-decoration: underline; background: #f5f3ff; padding: 2px 8px; border-radius: 8px; border: 1px solid #ddd6fe; font-size: 0.85em; transition: all 0.2s; display: inline-block; }
        .wiki-link:hover { background: #4f46e5; color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo, useMemo } = React;

        const SUPABASE_URL = 'https://jslelyvziimqimmaxvlk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGVseXZ6aWltcWltbWF4dmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNTksImV4cCI6MjA5MzM2MTM1OX0.DdDfRZcgfNu7fFZi0uHMSBi-TUNvYVEuHMwiPHdJIa4'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MediaViewer = ({ item, className, autoPlay = true }) => {
            if (!item?.url) return null;
            if (item.type === 'video') return <video src={item.url} className={className} loop muted autoPlay={autoPlay} playsInline />;
            return <img src={item.url} className={className} loading="lazy" />;
        };

        const NoteRenderer = memo(({ text, onJump, library }) => {
            if (!text) return <p className="text-slate-300 italic text-xs">No notes...</p>;
            const parts = text.split(/(\[\[Card:[^\]]+\]\])/g);
            return (
                <div className="whitespace-pre-wrap leading-relaxed text-slate-600 text-sm">
                    {parts.map((part, i) => {
                        const match = part.match(/\[\[Card:([^\]|]+)(?:\|([^\]]+))?\]\]/);
                        if (match) {
                            const rawId = match[1];
                            const label = match[2];
                            const card = library[rawId] || Object.values(library).find(c => c.header === rawId);
                            return (
                                <span key={i} className="wiki-link" onClick={(e) => { e.stopPropagation(); onJump(card?.id); }}>
                                    📄 {label || card?.header || "Unknown"}
                                </span>
                            );
                        }
                        return part;
                    })}
                </div>
            );
        });

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [pulse, setPulse] = useState('online'); // online, syncing, error
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]);
            const [masterLibrary, setMasterLibrary] = useState({});
            const [activeStack, setActiveStack] = useState(null);
            const [focusedCardId, setFocusedCardId] = useState(null);
            const [reviewRows, setReviewRows] = useState([]);
            const [currentRow, setCurrentRow] = useState(0);
            const [mediaIndices, setMediaIndices] = useState({});
            const [zoomUrl, setZoomUrl] = useState(null);
            const [editorSearch, setEditorSearch] = useState('');

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); bootStudio(); }
                    else { setIsLoading(false); }
                });
            }, []);

            const bootStudio = async () => {
                setIsLoading(true);
                try {
                    const { data: cards, error: cErr } = await supabase.from('cards').select('*, media(*)');
                    const { data: stacksData, error: sErr } = await supabase.from('stacks').select('*').order('created_at', { ascending: false });
                    if (cErr || sErr) throw (cErr || sErr);
                    const lib = {};
                    cards?.forEach(c => lib[c.id] = { ...c, media: c.media || [] });
                    setMasterLibrary(lib);
                    setStacks(stacksData || []);
                } catch (err) { setPulse('error'); }
                finally { setIsLoading(false); }
            };

            const handleLogin = async () => {
                // A. Force Login Screen
                await supabase.auth.signInWithOAuth({ 
                    provider: 'google',
                    options: { redirectTo: window.location.href, queryParams: { prompt: 'select_account' } }
                });
            };

            const handleLogout = async () => {
                await supabase.auth.signOut();
                window.location.reload();
            };

            const createStack = async () => {
                setPulse('syncing');
                // B. Fix Permission Denied (Ensure user.id is passed)
                const { data, error } = await supabase.from('stacks')
                    .insert({ user_id: user.id, name: 'New Stack' })
                    .select().single();
                if (error) { setPulse('error'); alert(`Access Denied: ${error.message}`); }
                else { setStacks([data, ...stacks]); setPulse('online'); }
            };

            const openStack = async (stack) => {
                setIsLoading(true);
                const { data: items } = await supabase.from('stack_items').select('card_id').eq('stack_id', stack.id).order('position');
                setActiveStack({ ...stack, card_ids: (items || []).map(i => i.card_id).filter(id => masterLibrary[id]) });
                setView('edit');
                setIsLoading(false);
            };

            const updateCard = async (cid, updates) => {
                setPulse('syncing');
                setMasterLibrary(prev => ({ ...prev, [cid]: { ...prev[cid], ...updates } }));
                const { error } = await supabase.from('cards').update(updates).eq('id', cid);
                setPulse(error ? 'error' : 'online');
            };

            const getExtendedMedia = (cid) => {
                const card = masterLibrary[cid]; if (!card) return [];
                const own = card.media || [];
                const links = (card.description || "").match(/\[\[Card:([^\]|]+)/g) || [];
                const linkedMedia = [];
                const seen = new Set([cid]);
                links.forEach(link => {
                    const id = link.replace('[[Card:', '');
                    const target = masterLibrary[id] || Object.values(masterLibrary).find(c => c.header === id);
                    if (target?.media && !seen.has(target.id)) {
                        linkedMedia.push(...target.media.map(m => ({ ...m, source: target.header })));
                        seen.add(target.id);
                    }
                });
                return [...own, ...linkedMedia];
            };

            const enterReview = () => {
                if (!activeStack?.card_ids.length) return;
                const rows = [];
                for (let i = 0; i < activeStack.card_ids.length; i += 3) rows.push(activeStack.card_ids.slice(i, i + 3));
                setReviewRows(rows);
                setCurrentRow(0);
                setView('review');
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center bg-white"><div className="loading-spin"></div></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <button onClick={handleLogin} className="bg-white text-slate-900 px-12 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl hover:scale-105 transition-all">Sign In to Vault</button>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-12 pb-40">
                    
                    {/* C. DB HEARTBEAT PULSE */}
                    <div className="fixed bottom-10 right-10 z-[8000]">
                        <div className={`glass px-6 py-4 rounded-3xl flex items-center gap-5 shadow-2xl border-2 transition-all duration-500 ${pulse === 'error' ? 'border-rose-400' : 'border-white'}`}>
                            <div className="text-right leading-none">
                                <p className={`text-[9px] font-black uppercase tracking-widest mb-1 ${pulse === 'online' ? 'text-emerald-500' : pulse === 'syncing' ? 'text-indigo-500' : 'text-rose-500'}`}>Database Pulse</p>
                                <p className="text-[11px] font-bold text-slate-400">{pulse === 'error' ? 'Link Severed' : 'System Live'}</p>
                            </div>
                            <div className={`w-4 h-4 rounded-full transition-all ${pulse === 'online' ? 'bg-emerald-500 shadow-[0_0_10px_#10b981]' : pulse === 'syncing' ? 'bg-indigo-500 animate-ping' : 'bg-rose-500 pulse-ring'}`}></div>
                        </div>
                    </div>

                    {zoomUrl && <div className="fixed inset-0 z-[9000] bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setZoomUrl(null)}><img src={zoomUrl} className="max-w-full max-h-full object-contain shadow-2xl rounded-xl" /></div>}

                    {view === 'library' && (
                        <div className="space-y-16 animate-in fade-in duration-700">
                            <header className="flex justify-between items-end">
                                <div>
                                    <h1 className="text-6xl font-black uppercase italic tracking-tighter text-indigo-600 leading-none">The Vault</h1>
                                    <p className="text-slate-400 font-bold uppercase text-[11px] tracking-widest mt-4">Database Persistence v14.4</p>
                                </div>
                                <div className="flex items-center gap-6">
                                    <button onClick={handleLogout} className="text-slate-400 font-black text-[10px] uppercase hover:text-rose-500">Logout</button>
                                    <button onClick={createStack} className="bg-indigo-600 text-white px-12 py-5 rounded-full font-black text-xs uppercase shadow-2xl hover:scale-105 active:scale-95 transition-all tracking-widest">+ NEW STACK</button>
                                </div>
                            </header>

                            {stacks.length === 0 ? (
                                <div className="py-32 text-center bg-white rounded-[5rem] border-4 border-dashed border-slate-100"><p className="text-slate-300 font-black uppercase tracking-widest text-sm">No stacks available</p></div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                                    {stacks.map(s => (
                                        <div key={s.id} onClick={() => openStack(s)} className="bg-white p-14 rounded-[4rem] border border-slate-100 hover:border-indigo-400 cursor-pointer shadow-sm group text-center relative transition-all hover:shadow-xl hover:-translate-y-1">
                                            <div className="w-16 h-16 bg-indigo-50 rounded-3xl mb-6 flex items-center justify-center text-indigo-600 font-black mx-auto text-xl italic shadow-inner">S</div>
                                            <h3 className="font-black text-slate-800 text-2xl uppercase tracking-tighter leading-none mb-2">{s.name}</h3>
                                            <button onClick={(e) => { e.stopPropagation(); if(confirm('Delete?')) supabase.from('stacks').delete().eq('id', s.id).then(bootStudio); }} className="absolute top-10 right-10 text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 font-bold text-2xl transition-all">×</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {view === 'edit' && activeStack && (
                        <div className="space-y-10 animate-in fade-in duration-500">
                            <nav className="flex justify-between items-center glass p-8 rounded-[3rem] shadow-xl border border-white">
                                <div className="flex gap-8 items-center">
                                    <button onClick={() => setView('library')} className="text-slate-400 font-black text-xs uppercase tracking-widest hover:text-indigo-600 transition-colors">← Vault</button>
                                    <input className="text-3xl font-black uppercase italic tracking-tighter text-indigo-600 bg-transparent outline-none" value={activeStack.name} onChange={(e) => { const n = e.target.value; setActiveStack({...activeStack, name: n}); supabase.from('stacks').update({name: n}).eq('id', activeStack.id); }} />
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={async () => {
                                        const { data: card } = await supabase.from('cards').insert({ user_id: user.id, header: 'New Card' }).select().single();
                                        if (card) {
                                            await supabase.from('stack_items').insert({ stack_id: activeStack.id, card_id: card.id, position: activeStack.card_ids.length });
                                            setMasterLibrary({ ...masterLibrary, [card.id]: { ...card, media: [] } });
                                            setActiveStack({ ...activeStack, card_ids: [...activeStack.card_ids, card.id] });
                                            setFocusedCardId(card.id);
                                        }
                                    }} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg">+ Add Card</button>
                                    <button onClick={enterReview} className="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-black text-xs uppercase shadow-2xl tracking-widest hover:scale-105 transition-all">Start Sweep</button>
                                </div>
                            </nav>
                            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6">
                                {activeStack.card_ids.map(cid => {
                                    const card = masterLibrary[cid];
                                    if (!card) return null;
                                    return (
                                        <div key={cid} onClick={() => setFocusedCardId(cid)} className="bg-white rounded-[2.5rem] p-5 shadow-sm border-2 border-transparent hover:border-indigo-400 cursor-pointer transition-all flex flex-col h-[340px] group">
                                            <div className="aspect-video bg-slate-900 rounded-3xl overflow-hidden mb-4 shadow-inner">
                                                {card.media?.[0] && <MediaViewer item={card.media[0]} className="w-full h-full object-cover opacity-80" autoPlay={false} />}
                                            </div>
                                            <h4 className="font-black text-[12px] uppercase tracking-tighter mb-2 leading-none text-slate-800">{card.header}</h4>
                                            <p className="text-[10px] text-slate-400 line-clamp-4 leading-relaxed font-medium">{card.description || "..."}</p>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    {focusedCardId && masterLibrary[focusedCardId] && (
                        <div className="fixed inset-0 z-[10000] bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-6 md:p-16">
                            <div className="bg-white w-full max-w-7xl h-[88vh] rounded-[4rem] shadow-2xl flex flex-col overflow-hidden modal-enter relative">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50">
                                    <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest italic">Focus Workspace</span>
                                    <button onClick={() => setFocusedCardId(null)} className="text-slate-300 hover:text-rose-500 font-black text-5xl transition-colors">×</button>
                                </div>
                                <div className="flex-1 flex overflow-hidden p-12 gap-16">
                                    <div className="w-1/4 flex flex-col gap-8 overflow-y-auto pr-4 shrink-0">
                                        <div className="aspect-square bg-slate-900 rounded-[3rem] overflow-hidden shadow-2xl relative group">
                                            <MediaViewer item={getExtendedMedia(focusedCardId)[0]} className="w-full h-full object-contain" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {getExtendedMedia(focusedCardId).map((m, idx) => (
                                                <div key={idx} className="aspect-video bg-black rounded-3xl overflow-hidden shadow-lg group relative border border-slate-100" onClick={() => setZoomUrl(m.url)}>
                                                    <MediaViewer item={m} className="w-full h-full object-cover opacity-70 group-hover:opacity-100" autoPlay={false} />
                                                    {m.source && <div className="absolute bottom-2 left-2 glass px-2 py-1 rounded text-[8px] font-black text-indigo-600">Ref: {m.source}</div>}
                                                </div>
                                            ))}
                                            <label className="aspect-video border-2 border-dashed border-slate-300 rounded-3xl flex flex-col items-center justify-center text-[10px] font-black uppercase text-slate-400 cursor-pointer hover:border-indigo-400 transition-all">
                                                <span>+ Media</span>
                                                <input type="file" hidden accept="image/*,video/*" onChange={async (e) => {
                                                    const file = e.target.files[0]; if(!file) return;
                                                    setPulse('syncing');
                                                    const fileName = `${user.id}/${Date.now()}-${file.name}`;
                                                    const { data } = await supabase.storage.from('media').upload(fileName, file);
                                                    if(data) {
                                                        const { data: { publicUrl } } = supabase.storage.from('media').getPublicUrl(fileName);
                                                        const { data: m } = await supabase.from('media').insert({ card_id: focusedCardId, url: publicUrl, type: file.type.startsWith('video') ? 'video' : 'image' }).select().single();
                                                        setMasterLibrary(prev => ({ ...prev, [focusedCardId]: { ...prev[focusedCardId], media: [...(prev[focusedCardId].media || []), m] } }));
                                                        setPulse('online');
                                                    }
                                                }} />
                                            </label>
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col gap-8 overflow-hidden">
                                        <input className="text-5xl font-black outline-none border-b-4 border-slate-50 focus:border-indigo-500 pb-6 tracking-tighter uppercase italic text-slate-800" value={masterLibrary[focusedCardId].header || ""} onChange={(e) => updateCard(focusedCardId, {header: e.target.value})} />
                                        <div className="flex-1 overflow-y-auto pr-4">
                                            <div className="mb-10 bg-slate-50 p-8 rounded-[3rem] shadow-inner">
                                                <NoteRenderer text={masterLibrary[focusedCardId].description} onJump={setFocusedCardId} library={masterLibrary} />
                                            </div>
                                            <textarea className="w-full h-96 text-slate-600 text-xl outline-none resize-none leading-relaxed font-medium" placeholder="Expand knowledge..." value={masterLibrary[focusedCardId].description || ""} onChange={(e) => updateCard(focusedCardId, {description: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="w-1/5 bg-slate-900 rounded-[3rem] p-8 flex flex-col shrink-0">
                                        <h4 className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-6 border-b border-white/10 pb-4 italic">Quick Link</h4>
                                        <input className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-xs font-bold text-white outline-none mb-6" placeholder="Find..." value={editorSearch} onChange={(e) => setEditorSearch(e.target.value)} />
                                        <div className="flex-1 overflow-y-auto space-y-2">
                                            {Object.values(masterLibrary).filter(c => c.header?.toLowerCase().includes(editorSearch.toLowerCase()) && c.id !== focusedCardId).slice(0, 15).map(c => (
                                                <button key={c.id} onClick={() => updateCard(focusedCardId, { description: (masterLibrary[focusedCardId].description || "") + ` [[Card:${c.id}|${c.header}]]` })} className="w-full text-left bg-white/5 text-white p-3 rounded-xl text-[10px] font-black hover:bg-indigo-600 truncate transition-all">📄 {c.header}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'review' && reviewRows.length > 0 && (
                        <div className="animate-in fade-in duration-500 pb-40">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                {[0, 1, 2].map(i => {
                                    const cid = reviewRows[currentRow]?.[i]; const card = masterLibrary[cid];
                                    if (!card) return <div key={i} className="rounded-[4rem] bg-slate-100/50 border-dashed border-2 border-slate-200 h-[680px]"></div>;
                                    const extMedia = getExtendedMedia(cid); const midx = mediaIndices[cid] || 0;
                                    return (
                                        <div key={i} className="flex flex-col gap-4">
                                            <div className="text-center font-black text-indigo-200 text-[10px] uppercase tracking-widest italic leading-none">Slot {String.fromCharCode(65+i)}</div>
                                            <div className="rounded-[4rem] bg-white shadow-2xl p-10 h-[680px] flex flex-col relative transition-all border-2 border-transparent">
                                                <h2 onClick={() => setFocusedCardId(cid)} className="text-2xl font-black uppercase tracking-tighter mb-6 text-slate-800 cursor-pointer hover:text-indigo-600">{card.header}</h2>
                                                <div className="relative bg-black rounded-[2.5rem] overflow-hidden mb-8 aspect-video shrink-0 shadow-2xl">
                                                    <div className="w-full h-full cursor-zoom-in" onClick={() => setZoomUrl(extMedia[midx]?.url)}><MediaViewer item={extMedia[midx]} className="w-full h-full object-contain" /></div>
                                                    {extMedia.length > 1 && (
                                                        <div className="absolute inset-x-4 top-1/2 -translate-y-1/2 flex justify-between">
                                                            <button onClick={() => setMediaIndices(prev => ({...prev, [cid]: (midx - 1 + extMedia.length) % extMedia.length}))} className="glass text-indigo-600 w-12 h-12 rounded-full font-black">←</button>
                                                            <button onClick={() => setMediaIndices(prev => ({...prev, [cid]: (midx + 1) % extMedia.length}))} className="glass text-indigo-600 w-12 h-12 rounded-full font-black">→</button>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex-1 overflow-y-auto pr-2">
                                                    <NoteRenderer text={card.description} onJump={setFocusedCardId} library={masterLibrary} />
                                                    <textarea className="w-full h-40 mt-8 p-6 bg-slate-50 rounded-[2rem] text-sm font-medium outline-none resize-none shadow-inner" value={card.description || ""} onChange={(e) => updateCard(cid, {description: e.target.value})} />
                                                </div>
                                            </div>
                                            <div className="flex justify-center gap-3">
                                                <button disabled={i===0} onClick={()=> {const nr = [...reviewRows]; const r = [...nr[currentRow]]; [r[i], r[i-1]] = [r[i-1], r[i]]; nr[currentRow] = r; setReviewRows(nr);}} className="bg-white px-10 py-3 rounded-2xl shadow-sm font-black text-[10px] disabled:opacity-20 uppercase italic transition-all hover:bg-slate-50">← Swap</button>
                                                <button disabled={i===2 || !reviewRows[currentRow][i+1]} onClick={()=> {const nr = [...reviewRows]; const r = [...nr[currentRow]]; [r[i], r[i+1]] = [r[i+1], r[i]]; nr[currentRow] = r; setReviewRows(nr);}} className="bg-white px-10 py-3 rounded-2xl shadow-sm font-black text-[10px] disabled:opacity-20 uppercase italic transition-all hover:bg-slate-50">Swap →</button>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1500] w-full max-w-3xl px-6">
                                <div className="glass p-3 rounded-full shadow-2xl flex items-center justify-between border-2 border-white">
                                    <button onClick={() => setView('edit')} className="px-8 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-rose-500">Exit</button>
                                    <div className="flex items-center gap-3">
                                        <button disabled={currentRow === 0} onClick={() => setCurrentRow(currentRow - 1)} className="bg-slate-100 text-slate-800 px-8 py-4 rounded-full font-black text-[11px] uppercase tracking-widest">Prev Set</button>
                                        <span className="text-[12px] font-black text-indigo-400 px-6 italic uppercase tracking-widest">{currentRow + 1} / {reviewRows.length}</span>
                                        {currentRow < reviewRows.length - 1 ? 
                                            <button onClick={() => setCurrentRow(currentRow + 1)} className="bg-indigo-600 text-white px-12 py-4 rounded-full font-black text-xs uppercase shadow-xl">Next Set</button> :
                                            <button onClick={async () => { setIsLoading(true); const colA = [], colB = [], colC = []; reviewRows.forEach(row => { if (row[0]) colA.push(row[0]); if (row[1]) colB.push(row[1]); if (row[2]) colC.push(row[2]); }); const newOrder = [...colA, ...colB, ...colC]; await supabase.from('stack_items').delete().eq('stack_id', activeStack.id); await supabase.from('stack_items').insert(newOrder.map((cid, idx) => ({ stack_id: activeStack.id, card_id: cid, position: idx }))); setActiveStack(p => ({...p, card_ids: newOrder})); setView('edit'); setIsLoading(false); }} className="bg-emerald-600 text-white px-14 py-4 rounded-full font-black text-xs uppercase italic tracking-widest shadow-xl">Complete Sweep</button>
                                        }
                                    </div>
                                    <div className="w-24"></div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
