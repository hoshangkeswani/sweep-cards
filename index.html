<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro | Master Studio v14.9.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .pulse-ring { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .wiki-link { cursor: pointer; color: #4f46e5; font-weight: 800; text-decoration: underline; background: #f5f3ff; padding: 2px 8px; border-radius: 8px; font-size: 0.85em; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = 'https://jslelyvziimqimmaxvlk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGVseXZ6aWltcWltbWF4dmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNTksImV4cCI6MjA5MzM2MTM1OX0.DdDfRZcgfNu7fFZi0uHMSBi-TUNvYVEuHMwiPHdJIa4'; // ENTER KEY
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const NoteRenderer = ({ text, library, onJump }) => {
            if (!text) return <p className="text-slate-300 italic py-2 text-xs">No notes...</p>;
            const parts = text.split(/(\[\[Card:[^\]]+\]\])/g);
            return (
                <div className="whitespace-pre-wrap text-slate-500 leading-relaxed text-[13px]">
                    {parts.map((part, i) => {
                        const match = part.match(/\[\[Card:([^\]|]+)(?:\|([^\]]+))?\]\]/);
                        if (match) {
                            const ref = match[1];
                            const label = match[2];
                            const target = library[ref] || Object.values(library).find(c => c.header === ref);
                            return <span key={i} onClick={(e) => { e.stopPropagation(); onJump && onJump(target?.id); }} className="wiki-link">📄 {label || target?.header || ref}</span>;
                        }
                        return part;
                    })}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [pulse, setPulse] = useState('online');
            const [view, setView] = useState('vault');
            const [stacks, setStacks] = useState([]);
            const [masterLibrary, setMasterLibrary] = useState({});
            const [activeStack, setActiveStack] = useState(null);
            const [focusCardId, setFocusCardId] = useState(null);

            useEffect(() => {
                _db.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); boot(); }
                });
            }, []);

            const boot = async () => {
                setPulse('syncing');
                const { data: cards } = await _db.from('cards').select('*');
                const { data: stacksData } = await _db.from('stacks').select('*').order('created_at', { ascending: false });
                const lib = {};
                cards?.forEach(c => lib[c.id] = c);
                setMasterLibrary(lib);
                setStacks(stacksData || []);
                setPulse('online');
            };

            const openStack = async (s) => {
                setPulse('syncing');
                const { data: items } = await _db.from('stack_items').select('card_id').eq('stack_id', s.id).order('position');
                setActiveStack({ ...s, card_ids: (items || []).map(i => i.card_id) });
                setView('studio');
                setPulse('online');
            };

            // FEATURE: NODE INJECTION (Create Card & Link to Stack)
            const addCardToStack = async () => {
                const header = prompt("New Card Title:");
                if (!header) return;

                setPulse('syncing');
                // 1. Create Atomic Card
                const { data: newCard, error: cErr } = await _db.from('cards')
                    .insert([{ header, user_id: user.id }]).select().single();
                
                if (cErr) { alert(cErr.message); setPulse('error'); return; }

                // 2. Create Relational Link (Stack Item)
                const { error: sErr } = await _db.from('stack_items')
                    .insert([{ 
                        stack_id: activeStack.id, 
                        card_id: newCard.id, 
                        position: activeStack.card_ids.length 
                    }]);

                if (sErr) { alert(sErr.message); setPulse('error'); return; }

                // 3. Update State
                setMasterLibrary({ ...masterLibrary, [newCard.id]: newCard });
                setActiveStack({ ...activeStack, card_ids: [...activeStack.card_ids, newCard.id] });
                setPulse('online');
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-950">
                    <button onClick={() => _db.auth.signInWithOAuth({ provider: 'google' })} className="bg-white px-12 py-5 rounded-full font-black uppercase text-xs tracking-widest hover:scale-105 transition-all">Sign In to Vault</button>
                </div>
            );

            return (
                <div className="p-8 md:p-20 min-h-screen">
                    {/* PULSE HUD */}
                    <div className="fixed bottom-10 right-10 z-[999] flex items-center gap-4 glass p-4 rounded-3xl shadow-2xl border-2 border-white">
                        <div className="text-right">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Studio Pulse</p>
                            <p className="text-xs font-bold text-slate-800 uppercase">{pulse}</p>
                        </div>
                        <div className={`w-4 h-4 rounded-full ${pulse === 'online' ? 'bg-emerald-500 pulse-ring' : pulse === 'syncing' ? 'bg-indigo-500 animate-ping' : 'bg-rose-500'}`}></div>
                    </div>

                    {view === 'vault' && (
                        <div className="max-w-7xl mx-auto">
                            <header className="flex justify-between items-end mb-20">
                                <div>
                                    <h1 className="text-8xl font-black italic tracking-tighter text-indigo-600 leading-none">THE VAULT</h1>
                                    <p className="mt-4 text-slate-400 font-bold uppercase text-[11px] tracking-[0.3em]">Identity Linked: {user.email}</p>
                                </div>
                                <button onClick={() => {
                                    const name = prompt("Stack Name:");
                                    if(name) _db.from('stacks').insert([{name, user_id: user.id}]).then(boot);
                                }} className="bg-slate-900 text-white px-12 py-5 rounded-full font-black text-xs uppercase shadow-xl hover:bg-indigo-600 transition-all">+ NEW STACK</button>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                {stacks.map(s => (
                                    <div key={s.id} onClick={() => openStack(s)} className="bg-white p-14 rounded-[4rem] border border-slate-100 hover:border-indigo-400 cursor-pointer transition-all hover:-translate-y-2 shadow-sm group relative">
                                        <div className="w-12 h-12 bg-indigo-50 rounded-2xl mb-6 flex items-center justify-center font-black text-indigo-600">S</div>
                                        <h2 className="text-2xl font-black uppercase tracking-tight text-slate-800">{s.name}</h2>
                                        <p className="text-[10px] font-bold text-slate-300 mt-2">UUID: {s.id.slice(0,8)}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'studio' && (
                        <div className="max-w-7xl mx-auto animate-in fade-in duration-500">
                            <nav className="flex justify-between items-center mb-16 glass p-8 rounded-[3rem] sticky top-10 z-[50]">
                                <button onClick={() => setView('vault')} className="text-xs font-black uppercase text-slate-400 hover:text-indigo-600 transition-all">← Exit to Vault</button>
                                <h2 className="text-3xl font-black italic uppercase tracking-tighter text-slate-900">{activeStack.name}</h2>
                                <button onClick={addCardToStack} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-105 transition-all">+ Add Card</button>
                            </nav>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[0, 1, 2].map(col => (
                                    <div key={col} className="space-y-6">
                                        <div className="px-8 mb-4 text-[10px] font-black uppercase text-slate-300 tracking-widest">Column {String.fromCharCode(65 + col)}</div>
                                        {activeStack.card_ids.filter((_, i) => i % 3 === col).map(id => (
                                            <div key={id} onClick={() => setFocusCardId(id)} className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm hover:border-indigo-200 cursor-pointer transition-all hover:-translate-y-1">
                                                <h3 className="font-black uppercase text-sm mb-4 tracking-tight text-slate-800">{masterLibrary[id]?.header}</h3>
                                                <NoteRenderer text={masterLibrary[id]?.notes?.slice(0, 100)} library={masterLibrary} onJump={(targetId) => setFocusCardId(targetId)} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* FOCUS EDITOR MODAL */}
                    {focusCardId && (
                        <div className="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
                            <div className="bg-white w-[90vw] h-[85vh] rounded-[4rem] overflow-hidden flex flex-col md:flex-row shadow-2xl animate-in zoom-in-95">
                                <div className="flex-1 p-12 md:p-20 overflow-y-auto no-scrollbar">
                                    <button onClick={() => setFocusCardId(null)} className="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-10 hover:text-rose-500">Close Editor</button>
                                    <input 
                                        className="block w-full text-5xl font-black italic uppercase tracking-tighter outline-none mb-10"
                                        value={masterLibrary[focusCardId].header}
                                        onChange={(e) => {
                                            const val = e.target.value;
                                            setMasterLibrary({...masterLibrary, [focusCardId]: {...masterLibrary[focusCardId], header: val}});
                                            _db.from('cards').update({header: val}).eq('id', focusCardId);
                                        }}
                                    />
                                    <textarea 
                                        className="w-full h-full min-h-[400px] outline-none text-slate-600 leading-relaxed text-lg resize-none"
                                        placeholder="Start typing..."
                                        value={masterLibrary[focusCardId].notes}
                                        onChange={(e) => {
                                            const val = e.target.value;
                                            setMasterLibrary({...masterLibrary, [focusCardId]: {...masterLibrary[focusCardId], notes: val}});
                                            _db.from('cards').update({notes: val}).eq('id', focusCardId);
                                        }}
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
