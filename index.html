<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: AI Debug Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .drawer-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // !!! RE-PASTE YOUR DRIVE KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCpRGr-L5zFJDksK6yT2KHxIlRgm6Daaz0';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [token, setToken] = useState(null);
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]); 
            const [masterLibrary, setMasterLibrary] = useState({}); 
            const [activeStack, setActiveStack] = useState(null); 
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('saved');
            const [showBorrowModal, setShowBorrowModal] = useState(false);
            const [borrowSearch, setBorrowSearch] = useState('');
            const [isNotepadOpen, setIsNotepadOpen] = useState(false); 
            const [focusedCardId, setFocusedCardId] = useState(null);
            const [zoomUrl, setZoomUrl] = useState(null); 
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);
            
            // AI Settings
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [aiLoadingId, setAiLoadingId] = useState(null);

            useEffect(() => {
                const initGapi = async () => {
                    try { 
                        await new Promise(r => gapi.load('client', r));
                        await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] }); 
                    } catch (e) { console.error("GAPI Init Fail"); }
                };
                initGapi();
            }, []);

            const handleLogin = () => {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => { if (res.access_token) { setToken(res.access_token); bootSystem(res.access_token); } },
                });
                client.requestAccessToken();
            };

            const bootSystem = async (at) => {
                setIsLoading(true);
                try {
                    const mList = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json' and trashed = false" });
                    if (mList.result.files?.[0]) {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${mList.result.files[0].id}?alt=media`, { headers: { Authorization: `Bearer ${at}` } });
                        const data = await res.json();
                        setMasterLibrary(data || {});
                    }
                    await refreshStacks(at);
                } catch (e) { console.error("Boot Fail"); }
                setIsLoading(false);
            };

            const refreshStacks = async (at) => {
                const sList = await gapi.client.drive.files.list({ q: "name contains 'sweep_stack_' and trashed = false", fields: "files(id, name)" });
                const files = sList.result.files || [];
                const withCounts = await Promise.all(files.map(async (f) => {
                    try {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`, { headers: { Authorization: `Bearer ${at}` } });
                        const data = await res.json();
                        return { ...f, count: Array.isArray(data) ? data.length : (data.cardIds?.length || 0) };
                    } catch(e) { return { ...f, count: 0 }; }
                }));
                setStacks(withCounts);
            };

            const saveMaster = async (nl) => {
                setSyncStatus('syncing');
                const list = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json' and trashed = false" });
                const id = list.result.files[0]?.id;
                const blob = new Blob([JSON.stringify(nl)], { type: 'application/json' });
                if (id) { await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, { method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob }); }
                setSyncStatus('saved');
            };

            const saveStackFile = async (sid, ids, notes) => {
                setSyncStatus('syncing');
                const blob = new Blob([JSON.stringify({ cardIds: ids, notes: notes || "" })], { type: 'application/json' });
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${sid}?uploadType=media`, { method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob });
                setSyncStatus('saved');
            };

            const openStack = async (stack) => {
                setIsLoading(true);
                try {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${stack.id}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
                    const data = await res.json();
                    const safeIds = Array.isArray(data) ? data : (data.cardIds || []);
                    setActiveStack({ ...stack, cardIds: safeIds, notes: data.notes || "" });
                    setView('edit');
                } catch (e) {}
                setIsLoading(false);
            };

            const generateAi = async (cid) => {
                if (!geminiKey) {
                    const k = prompt("Please enter your Gemini API Key:");
                    if (!k) return;
                    setGeminiKey(k); localStorage.setItem('gemini_api_key', k);
                }

                const card = masterLibrary[cid];
                if (!card.description) return alert("Add some notes first so the AI has something to read!");

                setAiLoadingId(cid);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: `Topic: ${card.header}\nNotes: ${card.description}\n\nTask: Provide 3 unique, brief, real-world examples. Start with "AI EXAMPLES:".` }] }] 
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message || "Invalid API Key");
                    }

                    const aiText = data.candidates[0].content.parts[0].text;
                    const nl = { ...masterLibrary, [cid]: { ...masterLibrary[cid], description: card.description + "\n\n" + aiText } };
                    setMasterLibrary(nl);
                    saveMaster(nl);
                } catch (e) {
                    alert("AI Error: " + e.message);
                    if (e.message.includes("API_KEY_INVALID")) {
                        localStorage.removeItem('gemini_api_key');
                        setGeminiKey('');
                    }
                }
                setAiLoadingId(null);
            };

            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 p-6 text-center">
                    <div className="bg-white p-12 md:p-20 rounded-[4rem] shadow-2xl max-w-sm w-full">
                        <h1 className="text-4xl font-black text-indigo-600 mb-2 italic">SWEEP_PRO</h1>
                        <p className="text-slate-400 mb-10">Synced Global Cloud Studio</p>
                        <button onClick={handleLogin} className="w-full bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition-all">CONNECT DRIVE</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white"><div className="loading-spin mb-4"></div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Syncing...</p></div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 pb-32">
                    
                    {zoomUrl && <div className="fixed inset-0 z-[6000] bg-black/95 flex items-center justify-center p-4 cursor-pointer" onClick={() => setZoomUrl(null)}><img src={zoomUrl} className="max-w-full max-h-full object-contain" /></div>}

                    {/* FOCUS EDITOR */}
                    {focusedCardId && masterLibrary[focusedCardId] && (
                        <div className="fixed inset-0 z-[4000] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 md:p-10">
                            <div className="bg-white w-full max-w-5xl h-[90vh] rounded-[3.5rem] shadow-2xl flex flex-col overflow-hidden">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50 shrink-0">
                                    <span className="text-[10px] font-black text-slate-400 uppercase">Editor</span>
                                    <button onClick={() => setFocusedCardId(null)} className="text-slate-400 hover:text-rose-500 font-black text-3xl">×</button>
                                </div>
                                <div className="flex-1 flex flex-col p-6 md:p-10 space-y-6 overflow-hidden">
                                    <input className="w-full text-3xl font-black outline-none border-b-2 border-slate-100 focus:border-indigo-500 pb-2 shrink-0" value={masterLibrary[focusedCardId].header} onChange={e => { const nl = { ...masterLibrary, [focusedCardId]: { ...masterLibrary[focusedCardId], header: e.target.value } }; setMasterLibrary(nl); saveMaster(nl); }} />
                                    <div className="flex flex-col md:flex-row gap-10 flex-1 overflow-hidden">
                                        <div className="w-full md:w-2/5 shrink-0">
                                            <div className="bg-slate-900 rounded-[2.5rem] aspect-square overflow-hidden flex items-center justify-center relative group">
                                                {masterLibrary[focusedCardId].image ? <img src={masterLibrary[focusedCardId].image} className="w-full h-full object-contain" /> : <span className="text-white/10 font-black">NO IMAGE</span>}
                                                <input type="file" hidden id="card-img-up" accept="image/*" onChange={e => { const r = new FileReader(); r.onload = ev => { const nl = { ...masterLibrary, [focusedCardId]: { ...masterLibrary[focusedCardId], image: ev.target.result } }; setMasterLibrary(nl); saveMaster(nl); }; r.readAsDataURL(e.target.files[0]); }} />
                                                <label htmlFor="card-img-up" className="absolute inset-0 bg-indigo-600/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer text-white font-black text-xs uppercase">Change Image</label>
                                            </div>
                                        </div>
                                        <textarea className="flex-1 bg-slate-50 p-8 rounded-[2.5rem] text-lg font-medium outline-none resize-none overflow-y-auto leading-relaxed" value={masterLibrary[focusedCardId].description} onChange={e => { const nl = { ...masterLibrary, [focusedCardId]: { ...masterLibrary[focusedCardId], description: e.target.value } }; setMasterLibrary(nl); saveMaster(nl); }} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                        <div className="flex items-center gap-4">
                            {view !== 'library' && <button onClick={() => setView('library')} className="font-bold text-slate-400 px-2 hover:text-indigo-600 transition-all">←</button>}
                            <h1 className="text-xl font-black text-indigo-600 uppercase italic truncate">{view === 'library' ? 'Stacks' : activeStack.name.replace('sweep_stack_', '').replace('.json', '')}</h1>
                        </div>
                        <div className="flex gap-2">
                            {view === 'library' ? (
                                <button onClick={() => { localStorage.removeItem('gemini_api_key'); setGeminiKey(''); alert('AI Key Cleared. Re-enter on next use.'); }} className="bg-slate-100 text-slate-400 px-6 py-3 rounded-xl font-bold text-xs uppercase border">Reset AI</button>
                            ) : (
                                <button onClick={() => { const rs = []; for (let i = 0; i < activeStack.cardIds.length; i += 3) rs.push(activeStack.cardIds.slice(i, i + 3)); setReviewRows(rs); setCurrentRow(0); setView('review'); setFocusedCardId(null); window.scrollTo(0,0); }} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-black text-xs uppercase shadow-lg hover:scale-105 transition-transform">Review</button>
                            )}
                        </div>
                    </nav>

                    {view === 'library' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {stacks.map(s => (
                                <div key={s.id} onClick={() => openStack(s)} className="bg-white p-10 rounded-[3rem] border border-slate-100 hover:border-indigo-400 cursor-pointer transition-all shadow-sm group relative">
                                    <div className="w-14 h-14 bg-indigo-50 rounded-[1.5rem] mb-4 flex items-center justify-center text-indigo-600 font-black italic shadow-inner group-hover:bg-indigo-600 group-hover:text-white transition-colors">S</div>
                                    <h3 className="font-black text-slate-700 text-xl uppercase truncate leading-none mb-2">{s.name.replace('sweep_stack_', '').replace('.json', '')}</h3>
                                    <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{s.count} Items</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'edit' && activeStack && (
                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                            {activeStack.cardIds.map(cid => {
                                const card = masterLibrary[cid]; if(!card) return null;
                                return (
                                    <div key={cid} onClick={() => setFocusedCardId(cid)} className={`bg-white rounded-3xl border-2 cursor-pointer transition-all p-4 shadow-sm flex flex-col h-[280px] group ${focusedCardId === cid ? 'border-indigo-500 scale-95 shadow-xl' : 'border-transparent hover:border-indigo-100'}`}>
                                        <div className="aspect-video bg-slate-900 rounded-2xl overflow-hidden mb-3 shadow-inner">
                                            {card.image && <img src={card.image} className="w-full h-full object-contain opacity-80" loading="lazy" />}
                                        </div>
                                        <h4 className="font-black text-[11px] uppercase truncate mb-1 text-slate-800 leading-none">{card.header || "No Title"}</h4>
                                        <p className="text-[9px] text-slate-400 font-medium line-clamp-2 leading-tight overflow-hidden">{card.description || "..."}</p>
                                    </div>
                                )
                            })}
                        </div>
                    )}

                    {view === 'review' && (
                        <div className="animate-in fade-in duration-500 pb-32">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                {[0, 1, 2].map(i => {
                                    const cid = reviewRows[currentRow]?.[i]; const card = masterLibrary[cid];
                                    return (
                                        <div key={i} className="flex flex-col gap-3">
                                            <div className="text-center font-black text-indigo-300 text-[10px] tracking-widest uppercase italic leading-none">Col {String.fromCharCode(65+i)}</div>
                                            <div className={`rounded-[3rem] border-2 p-10 h-[550px] flex flex-col transition-all duration-500 ${card ? 'bg-white shadow-2xl border-white hover:border-indigo-50' : 'bg-slate-100 border-dashed border-slate-200'}`}>
                                                {card && (
                                                    <div className="h-full flex flex-col overflow-hidden">
                                                        <div className="flex justify-between items-start mb-4">
                                                            <input className="flex-1 text-2xl font-black outline-none border-none bg-transparent mb-4 leading-none" value={card.header} onChange={e => { const nl = { ...masterLibrary, [cid]: { ...masterLibrary[cid], header: e.target.value } }; setMasterLibrary(nl); saveMaster(nl); }} />
                                                            <button onClick={() => generateAi(cid)} className={`w-9 h-9 rounded-full flex items-center justify-center transition-all ${aiLoadingId === cid ? 'loading-spin border-indigo-500' : 'bg-indigo-50 text-indigo-600 hover:scale-110 active:bg-indigo-100 shadow-sm border'}`}>✨</button>
                                                        </div>
                                                        {card.image && <div className="bg-black rounded-[2rem] overflow-hidden mb-6 aspect-video flex items-center justify-center cursor-zoom-in shadow-xl shrink-0" onClick={() => setZoomUrl(card.image)}><img src={card.image} className="w-full h-full object-contain" /></div>}
                                                        <textarea className="flex-1 w-full text-slate-500 text-base outline-none resize-none bg-transparent font-medium leading-relaxed" placeholder="..." value={card.description} onChange={e => { const nl = { ...masterLibrary, [cid]: { ...masterLibrary[cid], description: e.target.value } }; setMasterLibrary(nl); saveMaster(nl); }} />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                            <div className="fixed bottom-8 left-0 right-0 flex justify-center z-[2000] px-6 text-center">
                                <div className="bg-white p-4 rounded-full shadow-2xl flex items-center gap-4 border">
                                    <button onClick={() => setView('edit')} className="px-6 py-2 text-xs font-black text-slate-400">Exit</button>
                                    <span className="text-[10px] font-black text-indigo-600">SET {currentRow + 1} / {reviewRows.length}</span>
                                    {currentRow < reviewRows.length - 1 ? 
                                        <button onClick={() => setCurrentRow(currentRow + 1)} className="bg-indigo-600 text-white px-10 py-3 rounded-full font-black text-xs">Next</button> :
                                        <button onClick={async () => { setSyncStatus('syncing'); const a=[], b=[], c=[]; reviewRows.forEach(r => { if(r[0]) a.push(r[0]); if(r[1]) b.push(r[1]); if(r[2]) c.push(r[2]); }); const ni = [...a, ...b, ...c]; await saveStackFile(activeStack.id, ni, activeStack.notes); setActiveStack({...activeStack, cardIds: ni}); setView('edit'); }} className="bg-emerald-600 text-white px-10 py-3 rounded-full font-black text-xs italic">Complete Sweep</button>
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
