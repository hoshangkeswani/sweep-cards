<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: Zoom & Sync Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; border-top-color: #4f46e5; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-zoom { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // !!! IMPORTANT: RE-PASTE YOUR KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCpRGr-L5zFJDksK6yT2KHxIlRgm6Daaz0';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]); 
            const [masterLibrary, setMasterLibrary] = useState({}); 
            const [activeStack, setActiveStack] = useState(null); 
            
            const [token, setToken] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [showBorrowModal, setShowBorrowModal] = useState(false);
            const [zoomedImg, setZoomedImg] = useState(null); // Lightbox State
            
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);
            const fileInputRef = useRef(null);
            const saveTimeoutRef = useRef(null);

            useEffect(() => {
                gapi.load('client', async () => {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                });
            }, []);

            const login = () => {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => {
                        setToken(res.access_token);
                        initialSystemBoot(res.access_token);
                    },
                });
                client.requestAccessToken();
            };

            const initialSystemBoot = async (accessToken) => {
                setIsLoading(true);
                await fetchMasterLibrary(accessToken);
                await refreshLibraryList(accessToken);
                setIsLoading(false);
            };

            const fetchMasterLibrary = async (accessToken) => {
                try {
                    const list = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                    if (list.result.files[0]) {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${list.result.files[0].id}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        setMasterLibrary(await res.json());
                    }
                } catch (e) { console.error(e); }
            };

            const refreshLibraryList = async (accessToken) => {
                try {
                    const list = await gapi.client.drive.files.list({ 
                        q: "mimeType = 'application/json' and name contains 'sweep_stack_'",
                        fields: "files(id, name)"
                    });
                    const files = list.result.files || [];
                    const withCounts = await Promise.all(files.map(async (file) => {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        const ids = await res.json();
                        return { ...file, count: ids ? ids.length : 0 };
                    }));
                    setStacks(withCounts);
                } catch (e) { console.error(e); }
            };

            const saveMasterLibrary = async (newLib) => {
                const masterList = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                const masterId = masterList.result.files[0]?.id;
                const blob = new Blob([JSON.stringify(newLib)], { type: 'application/json' });
                if (masterId) {
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${masterId}?uploadType=media`, {
                        method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                    });
                } else {
                    const meta = { name: 'sweep_master_library.json', mimeType: 'application/json' };
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                    form.append('file', blob);
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                    });
                }
            };

            const saveStackOrder = async (stackId, cardIds) => {
                setSyncStatus('syncing');
                const blob = new Blob([JSON.stringify(cardIds)], { type: 'application/json' });
                const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${stackId}?uploadType=media`, {
                    method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                });
                setSyncStatus('saved');
                return res.ok;
            };

            const openStack = async (stackFile) => {
                setIsLoading(true);
                try {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${stackFile.id}?alt=media`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const cardIds = await res.json();
                    setActiveStack({ ...stackFile, cardIds: cardIds || [] });
                    setView('edit');
                } catch (e) { console.error(e); }
                setIsLoading(false);
            };

            const createStack = async () => {
                const name = prompt("New Collection Name:");
                if (!name) return;
                setIsLoading(true);
                const metadata = { name: `sweep_stack_${name}.json`, mimeType: 'application/json' };
                const blob = new Blob([JSON.stringify([])], { type: 'application/json' });
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', blob);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                });
                await refreshLibraryList(token);
                setIsLoading(false);
            };

            const deleteStack = async (id, e) => {
                e.stopPropagation();
                if(!confirm("Delete collection?")) return;
                setIsLoading(true);
                await gapi.client.drive.files.delete({ fileId: id });
                await refreshLibraryList(token);
                setIsLoading(false);
            };

            const updateCardData = (cardId, updates) => {
                const newLib = { ...masterLibrary, [cardId]: { ...masterLibrary[cardId], ...updates } };
                setMasterLibrary(newLib);
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                saveTimeoutRef.current = setTimeout(() => saveMasterLibrary(newLib), 2000);
            };

            const addNewCard = () => {
                const id = "c_" + Date.now() + Math.random().toString(36).substr(2, 5);
                const newLib = { ...masterLibrary, [id]: { id, header: '', description: '', image: null } };
                const newIds = [...activeStack.cardIds, id];
                setMasterLibrary(newLib);
                setActiveStack({...activeStack, cardIds: newIds});
                saveMasterLibrary(newLib);
                saveStackOrder(activeStack.id, newIds);
            };

            const borrowCard = (id) => {
                if (activeStack.cardIds.includes(id)) return;
                const newIds = [...activeStack.cardIds, id];
                setActiveStack({ ...activeStack, cardIds: newIds });
                saveStackOrder(activeStack.id, newIds);
            };

            const removeCardFromStack = (id) => {
                const newIds = activeStack.cardIds.filter(cid => cid !== id);
                setActiveStack({ ...activeStack, cardIds: newIds });
                saveStackOrder(activeStack.id, newIds);
            };

            const bulkUpload = (e) => {
                const files = Array.from(e.target.files);
                setIsLoading(true);
                let processed = 0;
                let tempLib = { ...masterLibrary };
                let tempIds = [ ...activeStack.cardIds ];
                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const id = "c_" + Math.random().toString(36).substr(2, 9);
                        tempLib[id] = { id, header: file.name.split('.')[0], description: '', image: ev.target.result };
                        tempIds.push(id);
                        processed++;
                        if (processed === files.length) {
                            setMasterLibrary(tempLib);
                            setActiveStack({ ...activeStack, cardIds: tempIds });
                            saveMasterLibrary(tempLib);
                            saveStackOrder(activeStack.id, tempIds);
                            setIsLoading(false);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            };

            const startReview = () => {
                const rows = [];
                for (let i = 0; i < activeStack.cardIds.length; i += 3) rows.push(activeStack.cardIds.slice(i, i + 3));
                setReviewRows(rows);
                setCurrentRow(0);
                setView('review');
            };

            const swap = (rowIdx, a, b) => {
                const newRows = [...reviewRows];
                const row = [...newRows[rowIdx]];
                [row[a], row[b]] = [row[b], row[a]];
                newRows[rowIdx] = row;
                setReviewRows(newRows);
            };

            const completeSweep = async () => {
                setSyncStatus('syncing');
                const a=[], b=[], c=[];
                reviewRows.forEach(row => { if(row[0]) a.push(row[0]); if(row[1]) b.push(row[1]); if(row[2]) c.push(row[2]); });
                const newIds = [...a, ...b, ...c];
                const success = await saveStackOrder(activeStack.id, newIds);
                if (success) {
                    setActiveStack({ ...activeStack, cardIds: newIds });
                    setView('edit');
                } else { alert("Cloud Sync Failed. Order not saved."); }
            };

            // Screens
            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-center p-6 text-white">
                    <div className="bg-white p-16 md:p-24 rounded-[4rem] shadow-2xl max-w-xl text-slate-900">
                        <h1 className="text-6xl font-black text-indigo-600 mb-4 italic tracking-tighter">SWEEP_PRO</h1>
                        <p className="text-slate-400 mb-12 font-medium">Synced Global Cloud Library</p>
                        <button onClick={login} className="w-full bg-indigo-600 text-white px-12 py-6 rounded-[2.5rem] font-black text-xl shadow-xl hover:bg-indigo-700 transition-all">CONNECT GOOGLE DRIVE</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-400">
                    <div className="w-16 h-16 border-8 border-slate-200 rounded-full loading-spin mb-6"></div>
                    <p className="font-black text-xs uppercase tracking-widest animate-pulse">Syncing Cloud Database...</p>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-10">
                    {/* Lightbox Overlay */}
                    {zoomedImg && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setZoomedImg(null)}>
                            <img src={zoomedImg} className="max-w-full max-h-full object-contain shadow-2xl animate-zoom" />
                            <button className="absolute top-10 right-10 text-white font-black text-4xl bg-white/10 w-16 h-16 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">×</button>
                        </div>
                    )}

                    <nav className="flex justify-between items-center mb-12 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                        <div className="flex items-center gap-6">
                            {view !== 'library' && <button onClick={() => setView('library')} className="bg-slate-50 p-4 rounded-2xl hover:bg-slate-200 font-black">← LIBRARY</button>}
                            <div>
                                <h1 className="text-2xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">{view === 'library' ? 'Collections' : activeStack.name.split('_')[2].split('.')[0]}</h1>
                                <span className={`text-[10px] font-black uppercase tracking-widest mt-1 block ${syncStatus === 'syncing' ? 'text-amber-500 animate-pulse' : 'text-slate-300'}`}>
                                    {syncStatus === 'syncing' ? 'Syncing to Drive...' : 'Cloud Safe'}
                                </span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {view === 'library' ? (
                                <button onClick={createStack} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-xs tracking-widest shadow-lg shadow-indigo-50 hover:scale-105 transition-transform">+ NEW STACK</button>
                            ) : view === 'edit' ? (
                                <>
                                    <button onClick={() => setShowBorrowModal(true)} className="bg-emerald-500 text-white px-6 py-4 rounded-2xl font-black text-xs shadow-lg shadow-emerald-50 hover:scale-105 transition-transform">BORROW</button>
                                    <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase hover:bg-black transition-all">Bulk</button>
                                    <button onClick={startReview} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-indigo-50 hover:scale-105 transition-transform">Start Review</button>
                                    <input type="file" multiple hidden ref={fileInputRef} onChange={bulkUpload} />
                                </>
                            ) : <div className="text-[10px] font-black text-indigo-400 bg-indigo-50 px-8 py-4 rounded-2xl uppercase tracking-widest">Active Review Mode</div>}
                        </div>
                    </nav>

                    {view === 'library' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            {stacks.map(s => (
                                <div key={s.id} onClick={() => openStack(s)} className="bg-white p-12 rounded-[4rem] border border-slate-100 hover:border-indigo-400 transition-all cursor-pointer group shadow-sm hover:shadow-2xl relative">
                                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl mb-8 group-hover:bg-indigo-600 transition-colors flex items-center justify-center text-indigo-600 group-hover:text-white font-black text-3xl italic shadow-inner">S</div>
                                    <h3 className="font-black text-slate-800 uppercase tracking-tighter text-2xl mb-2">{s.name.split('_')[2].split('.')[0]}</h3>
                                    <p className="text-xs font-black text-slate-300 uppercase tracking-widest italic">{s.count} Synced Cards</p>
                                    <button onClick={(e) => deleteStack(s.id, e)} className="absolute top-10 right-10 text-slate-200 hover:text-rose-500 font-bold transition-colors">×</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'edit' && activeStack && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {activeStack.cardIds.map(cid => {
                                const card = masterLibrary[cid];
                                if(!card) return null;
                                return (
                                    <div key={cid} className="bg-white rounded-[2.5rem] border border-slate-100 h-[540px] flex flex-col overflow-hidden shadow-sm hover:border-indigo-200 transition-all">
                                        <div className="p-6 flex-1 overflow-y-auto space-y-4">
                                            <input className="w-full font-black text-lg outline-none bg-transparent" placeholder="Untited" value={card.header} onChange={e => updateCardData(cid, {header: e.target.value})} />
                                            <label className="bg-slate-900 rounded-3xl aspect-[4/3] flex items-center justify-center overflow-hidden cursor-pointer hover:bg-slate-800 transition-all">
                                                {card.image ? <img src={card.image} loading="lazy" className="w-full h-full object-contain opacity-80" /> : <span className="text-white font-black text-[10px] opacity-40">ADD IMAGE</span>}
                                                <input type="file" hidden accept="image/*" onChange={(e) => {
                                                    const f = e.target.files[0];
                                                    const r = new FileReader();
                                                    r.onload = (ev) => updateCardData(cid, {image: ev.target.result});
                                                    r.readAsDataURL(f);
                                                }} />
                                            </label>
                                            <textarea className="w-full h-28 text-slate-500 text-sm outline-none resize-none bg-slate-50 p-5 rounded-2xl border-transparent focus:bg-white border focus:border-slate-100 leading-relaxed font-medium" placeholder="Notes..." value={card.description} onChange={e => updateCardData(cid, {description: e.target.value})} />
                                        </div>
                                        <div className="px-6 py-4 bg-slate-50 border-t flex justify-end">
                                            <button onClick={() => removeCardFromStack(cid)} className="text-slate-300 font-black text-[9px] hover:text-rose-500 tracking-widest uppercase transition-colors">Remove from stack</button>
                                        </div>
                                    </div>
                                )
                            })}
                            <button onClick={addNewCard} className="border-4 border-dashed border-slate-200 rounded-[3rem] h-[540px] text-slate-200 text-6xl hover:text-indigo-400 bg-white/40 transition-all">+</button>
                        </div>
                    )}

                    {view === 'review' && (
                        <div className="space-y-12 pb-32 max-w-7xl mx-auto animate-in fade-in duration-500">
                            <div className="flex justify-center">
                                <div className="bg-indigo-600 text-white px-12 py-5 rounded-[2rem] font-black text-lg tracking-[0.2em] shadow-2xl shadow-indigo-100 uppercase">
                                    Set {currentRow + 1} / {reviewRows.length}
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                {[0, 1, 2].map(i => {
                                    const cid = reviewRows[currentRow]?.[i];
                                    const card = masterLibrary[cid];
                                    return (
                                        <div key={i} className="flex flex-col gap-6">
                                            <div className="text-center font-black text-indigo-200 text-[10px] tracking-[0.5em] uppercase italic underline decoration-indigo-100 underline-offset-8">POSITION {String.fromCharCode(65+i)}</div>
                                            <div className={`flex-1 rounded-[4rem] border-4 min-h-[640px] p-12 transition-all ${card ? 'bg-white shadow-2xl border-white hover:border-indigo-50' : 'bg-slate-200/40 border-dashed border-slate-200 flex items-center justify-center'}`}>
                                                {card ? (
                                                    <div className="h-full flex flex-col">
                                                        <input className="w-full text-3xl font-black mb-8 outline-none bg-transparent" value={card.header} onChange={e => updateCardData(cid, {header: e.target.value})} />
                                                        
                                                        {card.image && (
                                                            <div 
                                                                className="bg-black rounded-[2.5rem] overflow-hidden mb-8 aspect-video flex items-center justify-center shadow-2xl cursor-zoom-in group relative"
                                                                onClick={() => setZoomedImg(card.image)}
                                                            >
                                                                <img src={card.image} className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500" />
                                                                <div className="absolute bottom-4 right-6 bg-black/50 text-white text-[10px] px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity font-bold">CLICK TO ENLARGE</div>
                                                            </div>
                                                        )}
                                                        
                                                        <textarea className="flex-1 w-full text-slate-500 text-lg leading-relaxed outline-none bg-transparent resize-none font-medium" value={card.description} onChange={e => updateCardData(cid, {description: e.target.value})} />
                                                    </div>
                                                ) : <span className="text-slate-300 italic font-black uppercase text-xs opacity-40">Empty Slot</span>}
                                            </div>
                                            {card && (
                                                <div className="flex justify-center gap-4">
                                                    <button disabled={i===0} onClick={()=>swap(currentRow, i, i-1)} className="bg-white px-10 py-5 rounded-3xl shadow-lg font-black text-xs disabled:opacity-20 active:scale-90 transition-all border border-slate-100 hover:border-indigo-400">← SWAP</button>
                                                    <button disabled={i===2 || !reviewRows[currentRow][i+1]} onClick={()=>swap(currentRow, i, i+1)} className="bg-white px-10 py-5 rounded-3xl shadow-lg font-black text-xs disabled:opacity-20 active:scale-90 transition-all border border-slate-100 hover:border-indigo-400">SWAP →</button>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                            <div className="flex justify-center pt-10">
                                {currentRow < reviewRows.length - 1 ? 
                                    <button onClick={()=>setCurrentRow(currentRow+1)} className="bg-indigo-600 text-white px-32 py-10 rounded-[3.5rem] font-black text-2xl shadow-2xl shadow-indigo-100 uppercase tracking-widest hover:scale-105 active:scale-95 transition-all">Next Set</button> :
                                    <button onClick={completeSweep} className="bg-emerald-600 text-white px-32 py-10 rounded-[3.5rem] font-black text-2xl shadow-2xl uppercase tracking-[0.2em] hover:scale-105 active:scale-95 transition-all italic font-serif">Complete Sweep & Lock Cloud</button>
                                }
                            </div>
                        </div>
                    )}

                    {showBorrowModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-3xl flex items-center justify-center p-6 z-50 animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-7xl max-h-[90vh] rounded-[5.5rem] overflow-hidden flex flex-col p-16 shadow-2xl">
                                <div className="flex justify-between items-center mb-12">
                                    <h2 className="text-4xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">Global Master Library</h2>
                                    <button onClick={() => setShowBorrowModal(false)} className="bg-slate-100 p-8 rounded-full text-slate-400 font-black text-2xl hover:text-rose-500 transition-colors">×</button>
                                </div>
                                <div className="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10 pr-4">
                                    {Object.values(masterLibrary).map(card => (
                                        <div key={card.id} className="bg-slate-50 border p-8 rounded-[3.5rem] flex flex-col gap-5 shadow-sm group hover:border-indigo-300 transition-all">
                                            <h4 className="font-black text-slate-800 text-base truncate uppercase tracking-tighter leading-none">{card.header || "Untitled"}</h4>
                                            <div className="bg-slate-200 aspect-video rounded-3xl overflow-hidden shadow-inner flex items-center justify-center italic text-[10px] text-slate-400">
                                                {card.image ? <img src={card.image} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" /> : "No Image"}
                                            </div>
                                            <button 
                                                disabled={activeStack.cardIds.includes(card.id)} 
                                                onClick={() => borrowCard(card.id)} 
                                                className={`w-full py-5 rounded-2xl font-black text-[10px] tracking-[0.2em] transition-all uppercase ${activeStack.cardIds.includes(card.id) ? 'bg-slate-100 text-slate-300' : 'bg-indigo-600 text-white shadow-xl hover:scale-105 active:scale-95'}`}
                                            >
                                                {activeStack.cardIds.includes(card.id) ? 'ALREADY IN STACK' : 'ADD TO STACK'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
