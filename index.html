<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Studio Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .card-inner-shadow { shadow-inner bg-slate-900 }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // !!! INSERT YOUR GOOGLE KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCpRGr-L5zFJDksK6yT2KHxIlRgm6Daaz0';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [deck, setDeck] = useState([]);
            const [mode, setMode] = useState('edit');
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);
            const [token, setToken] = useState(null);
            const [syncing, setSyncing] = useState(false);
            const fileInputRef = useRef(null);

            // --- GOOGLE DRIVE LOGIC ---
            useEffect(() => {
                gapi.load('client', () => {
                    gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                });
            }, []);

            const login = () => {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => {
                        setToken(res.access_token);
                        loadFromDrive(res.access_token);
                    },
                });
                client.requestAccessToken();
            };

            const saveToDrive = async (currentDeck) => {
                if (!token) return;
                setSyncing(true);
                try {
                    const list = await gapi.client.drive.files.list({ q: "name = 'sweep_studio_data.json'" });
                    const fileId = list.result.files[0]?.id;
                    const blob = new Blob([JSON.stringify(currentDeck)], { type: 'application/json' });

                    if (fileId) {
                        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                            method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                        });
                    } else {
                        const metadata = { name: 'sweep_studio_data.json', mimeType: 'application/json' };
                        const form = new FormData();
                        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                        form.append('file', blob);
                        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                            method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                        });
                    }
                } catch (e) { console.error(e); }
                setSyncing(false);
            };

            const loadFromDrive = async (accessToken) => {
                const list = await gapi.client.drive.files.list({ q: "name = 'sweep_studio_data.json'" });
                const fileId = list.result.files[0]?.id;
                if (fileId) {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    const data = await res.json();
                    setDeck(data || []);
                }
            };

            // --- CARD ACTIONS ---
            const addCard = () => {
                const newCard = { id: Date.now()+Math.random(), header: '', description: '', image: null, showFields: { header: true, desc: true, img: true } };
                const updated = [...deck, newCard];
                setDeck(updated);
                saveToDrive(updated);
            };

            const bulkUpload = (e) => {
                const files = Array.from(e.target.files);
                let processed = 0;
                const newCards = [];

                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        newCards.push({
                            id: Date.now() + Math.random(),
                            header: file.name.split('.')[0],
                            description: '',
                            image: ev.target.result,
                            showFields: { header: true, desc: true, img: true }
                        });
                        processed++;
                        if (processed === files.length) {
                            const updated = [...deck, ...newCards];
                            setDeck(updated);
                            saveToDrive(updated);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            };

            const updateCard = (id, updates) => {
                const updated = deck.map(c => c.id === id ? {...c, ...updates} : c);
                setDeck(updated);
                saveToDrive(updated);
            };

            // --- SWEEP LOGIC ---
            const startReview = () => {
                const rows = [];
                for (let i = 0; i < deck.length; i += 3) {
                    rows.push(deck.slice(i, i + 3));
                }
                setReviewRows(rows);
                setCurrentRow(0);
                setMode('review');
            };

            const swap = (rowIdx, a, b) => {
                const newRows = [...reviewRows];
                const row = [...newRows[rowIdx]];
                [row[a], row[b]] = [row[b], row[a]];
                newRows[rowIdx] = row;
                setReviewRows(newRows);
            };

            const completeSweep = () => {
                const colA = [], colB = [], colC = [];
                reviewRows.forEach(row => {
                    if (row[0]) colA.push(row[0]);
                    if (row[1]) colB.push(row[1]);
                    if (row[2]) colC.push(row[2]);
                });
                const finalDeck = [...colA, ...colB, ...colC];
                setDeck(finalDeck);
                saveToDrive(finalDeck);
                setMode('edit');
            };

            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <div className="text-center bg-white p-12 rounded-[3rem] shadow-2xl">
                        <h1 className="text-4xl font-black text-indigo-600 mb-2 italic">SWEEP_STUDIO</h1>
                        <p className="text-slate-400 mb-8 font-medium">Connect Google Drive to manage large decks.</p>
                        <button onClick={login} className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all">
                            Login with Google Drive
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <nav className="flex flex-col md:flex-row justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 gap-4">
                        <div>
                            <h1 className="text-3xl font-black text-indigo-600 italic">SWEEP_STUDIO</h1>
                            <div className="flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Cloud Sync: {deck.length} Items</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {mode === 'edit' ? (
                                <>
                                    {syncing && <span className="m-auto text-xs font-bold text-indigo-400 animate-pulse mr-2">SAVING...</span>}
                                    <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-black">Bulk Upload</button>
                                    <button onClick={startReview} disabled={deck.length === 0} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-indigo-700 disabled:opacity-50">START REVIEW</button>
                                    <input type="file" multiple hidden ref={fileInputRef} onChange={bulkUpload} accept="image/*" />
                                </>
                            ) : (
                                <button onClick={() => setMode('edit')} className="bg-rose-100 text-rose-600 px-8 py-3 rounded-xl font-bold text-sm">EXIT MODULE</button>
                            )}
                        </div>
                    </nav>

                    {mode === 'edit' ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {deck.map(card => (
                                <div key={card.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[500px] overflow-hidden hover:border-indigo-300 transition-all group">
                                    <div className="p-5 flex-1 overflow-y-auto space-y-4">
                                        <input className="w-full font-bold text-lg outline-none border-b-2 border-transparent focus:border-indigo-500 pb-1" placeholder="Title..." value={card.header} onChange={e => updateCard(card.id, {header: e.target.value})} />
                                        <div className="bg-slate-900 rounded-2xl aspect-[4/3] flex items-center justify-center overflow-hidden">
                                            {card.image ? <img src={card.image} className="w-full h-full object-contain" /> : <div className="text-slate-600 text-xs italic text-center p-4">Image from Bulk Upload will appear here.</div>}
                                        </div>
                                        <textarea className="w-full h-24 text-slate-500 text-sm outline-none resize-none bg-slate-50 p-3 rounded-xl border focus:bg-white" placeholder="Notes/Description..." value={card.description} onChange={e => updateCard(card.id, {description: e.target.value})} />
                                    </div>
                                    <div className="px-5 py-3 bg-slate-50 border-t flex justify-end">
                                        <button onClick={() => {if(confirm('Delete card?')){const d=deck.filter(c=>c.id!==card.id); setDeck(d); saveToDrive(d);}}} className="text-slate-300 hover:text-rose-500">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                        </button>
                                    </div>
                                </div>
                            ))}
                            <button onClick={addCard} className="border-4 border-dashed border-slate-200 rounded-3xl h-[500px] flex flex-col items-center justify-center text-slate-300 hover:text-indigo-400 hover:border-indigo-200 transition-all gap-2 bg-white/50">
                                <span className="text-5xl font-light">+</span>
                                <span className="text-xs font-bold uppercase tracking-widest">Add Card</span>
                            </button>
                        </div>
                    ) : (
                        /* REVIEW MODE */
                        <div className="max-w-6xl mx-auto space-y-10 animate-in fade-in duration-500">
                            <div className="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-slate-200">
                                <div className="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Live Session Progress</div>
                                <div className="bg-indigo-50 text-indigo-600 px-6 py-2 rounded-full font-black text-sm">SET {currentRow + 1} OF {reviewRows.length}</div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[0, 1, 2].map(colIdx => {
                                    const card = reviewRows[currentRow]?.[colIdx];
                                    return (
                                        <div key={colIdx} className="flex flex-col gap-6">
                                            <div className="text-center font-black text-indigo-300 text-[10px] tracking-[0.4em] uppercase">COLUMN {String.fromCharCode(65+colIdx)}</div>
                                            
                                            <div className={`flex-1 rounded-[2.5rem] border-4 min-h-[500px] p-6 transition-all duration-500 ${card ? 'bg-white shadow-2xl border-white' : 'bg-slate-200/40 border-dashed border-slate-200 flex items-center justify-center text-slate-300 italic text-xs'}`}>
                                                {card ? (
                                                    <div className="h-full flex flex-col">
                                                        <h2 className="text-xl font-bold mb-4 text-slate-800 leading-tight border-b pb-3">{card.header}</h2>
                                                        {card.image && (
                                                            <div className="bg-slate-900 rounded-2xl overflow-hidden mb-4 aspect-video flex items-center justify-center shadow-inner">
                                                                <img src={card.image} className="w-full h-full object-contain" />
                                                            </div>
                                                        )}
                                                        <div className="flex-1 overflow-y-auto">
                                                            <p className="text-slate-500 text-sm leading-relaxed whitespace-pre-wrap">{card.description || "No description provided."}</p>
                                                        </div>
                                                    </div>
                                                ) : "Slot Empty"}
                                            </div>

                                            {card && (
                                                <div className="flex justify-center gap-3">
                                                    <button disabled={colIdx === 0} onClick={() => swap(currentRow, colIdx, colIdx - 1)} className="bg-white px-5 py-2 rounded-xl shadow-md disabled:opacity-10 text-[10px] font-black hover:bg-slate-50">← SWAP</button>
                                                    <button disabled={colIdx === 2 || !reviewRows[currentRow][colIdx + 1]} onClick={() => swap(currentRow, colIdx, colIdx + 1)} className="bg-white px-5 py-2 rounded-xl shadow-md disabled:opacity-10 text-[10px] font-black hover:bg-slate-50">SWAP →</button>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>

                            <div className="flex justify-center pt-6 pb-20">
                                {currentRow < reviewRows.length - 1 ? (
                                    <button onClick={() => setCurrentRow(currentRow + 1)} className="bg-indigo-600 text-white px-20 py-5 rounded-[2rem] font-black text-lg shadow-2xl shadow-indigo-200 hover:scale-105 active:scale-95 transition-all">NEXT SET</button>
                                ) : (
                                    <button onClick={completeSweep} className="bg-emerald-600 text-white px-20 py-5 rounded-[2rem] font-black text-lg shadow-2xl shadow-emerald-200 hover:scale-105 active:scale-95 transition-all uppercase tracking-widest">Reshuffle & Sweep</button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
