<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: Recovery Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; border-top-color: #4f46e5; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // !!! RE-PASTE YOUR KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCpRGr-L5zFJDksK6yT2KHxIlRgm6Daaz0';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]); 
            const [masterLibrary, setMasterLibrary] = useState({}); 
            const [activeStack, setActiveStack] = useState(null); 
            
            const [token, setToken] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [showBorrowModal, setShowBorrowModal] = useState(false);
            const [showNotes, setShowNotes] = useState(false); 
            const [zoomUrl, setZoomUrl] = useState(null);
            
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);

            const saveTimeoutRef = useRef(null);
            const stackSaveTimeoutRef = useRef(null);

            useEffect(() => {
                gapi.load('client', async () => {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                });
            }, []);

            // Helper to safely get names
            const getSafeName = (fileName) => {
                if (!fileName) return "Untitled";
                return fileName.replace('sweep_stack_', '').replace('.json', '');
            };

            const login = () => {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => {
                        setToken(res.access_token);
                        bootSystem(res.access_token);
                    },
                });
                client.requestAccessToken();
            };

            const bootSystem = async (accessToken) => {
                setIsLoading(true);
                try {
                    // Load Library
                    const mList = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                    if (mList.result.files?.[0]) {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${mList.result.files[0].id}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        setMasterLibrary(await res.json());
                    }
                    // Load Collections
                    const sList = await gapi.client.drive.files.list({ 
                        q: "mimeType = 'application/json' and name contains 'sweep_stack_'",
                        fields: "files(id, name)"
                    });
                    const files = sList.result.files || [];
                    const withCounts = await Promise.all(files.map(async (file) => {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        const data = await res.json();
                        const count = Array.isArray(data) ? data.length : (data?.cardIds ? data.cardIds.length : 0);
                        return { ...file, count };
                    }));
                    setStacks(withCounts);
                } catch (e) { console.error("Boot error", e); }
                setIsLoading(false);
            };

            const saveStackToCloud = async (stackId, stackObj) => {
                setSyncStatus('syncing');
                const blob = new Blob([JSON.stringify(stackObj)], { type: 'application/json' });
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${stackId}?uploadType=media`, {
                    method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                });
                setSyncStatus('saved');
            };

            const saveMasterToCloud = async (libObj) => {
                const list = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                const id = list.result.files[0]?.id;
                const blob = new Blob([JSON.stringify(libObj)], { type: 'application/json' });
                if (id) {
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
                        method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                    });
                }
            };

            const openStack = async (stackFile) => {
                setIsLoading(true);
                try {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${stackFile.id}?alt=media`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const data = await res.json();
                    // CRITICAL FIX: Ensure valid object structure
                    const cardIds = Array.isArray(data) ? data : (data?.cardIds || []);
                    const notes = data?.notes || "";
                    setActiveStack({ ...stackFile, cardIds, notes });
                    setView('edit');
                } catch (e) { console.error("Open error", e); }
                setIsLoading(false);
            };

            const borrowCard = (id) => {
                if (!activeStack || activeStack.cardIds.includes(id)) return;
                const newIds = [...activeStack.cardIds, id];
                const updated = { ...activeStack, cardIds: newIds };
                setActiveStack(updated);
                saveStackToCloud(activeStack.id, { cardIds: newIds, notes: activeStack.notes });
            };

            const removeCard = (id) => {
                const newIds = activeStack.cardIds.filter(cid => cid !== id);
                const updated = { ...activeStack, cardIds: newIds };
                setActiveStack(updated);
                saveStackToCloud(activeStack.id, { cardIds: newIds, notes: activeStack.notes });
            };

            const updateCardData = (id, updates) => {
                const newLib = { ...masterLibrary, [id]: { ...masterLibrary[id], ...updates } };
                setMasterLibrary(newLib);
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                saveTimeoutRef.current = setTimeout(() => saveMasterToCloud(newLib), 2000);
            };

            const handleStackNotes = (val) => {
                const updated = { ...activeStack, notes: val };
                setActiveStack(updated);
                if (stackSaveTimeoutRef.current) clearTimeout(stackSaveTimeoutRef.current);
                stackSaveTimeoutRef.current = setTimeout(() => saveStackToCloud(activeStack.id, { cardIds: updated.cardIds, notes: updated.notes }), 2000);
            };

            const startReview = () => {
                const rs = [];
                for (let i = 0; i < activeStack.cardIds.length; i += 3) rs.push(activeStack.cardIds.slice(i, i + 3));
                setReviewRows(rs);
                setCurrentRow(0);
                setView('review');
            };

            const completeSweep = async () => {
                setSyncStatus('syncing');
                const a=[], b=[], c=[];
                reviewRows.forEach(r => { if(r[0]) a.push(r[0]); if(r[1]) b.push(r[1]); if(r[2]) c.push(r[2]); });
                const ni = [...a, ...b, ...c];
                await saveStackToCloud(activeStack.id, { cardIds: ni, notes: activeStack.notes });
                setActiveStack({...activeStack, cardIds: ni});
                setView('edit');
            };

            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-center p-6">
                    <div className="bg-white p-16 rounded-[3rem] shadow-2xl max-w-md w-full">
                        <h1 className="text-5xl font-black text-indigo-600 mb-8 italic tracking-tighter">SWEEP_SYNC</h1>
                        <button onClick={login} className="w-full bg-indigo-600 text-white px-8 py-5 rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition-all uppercase tracking-widest text-sm">Connect Drive</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-400">
                    <div className="w-12 h-12 border-4 border-slate-200 rounded-full loading-spin mb-4"></div>
                    <p className="font-black text-[10px] uppercase tracking-[0.3em]">Opening Collection...</p>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-10">
                    {zoomUrl && (
                        <div className="fixed inset-0 z-[999] bg-black/95 flex items-center justify-center p-4 cursor-zoom-out lightbox-anim" onClick={() => setZoomUrl(null)}>
                            <img src={zoomUrl} className="max-w-full max-h-full object-contain shadow-2xl" />
                        </div>
                    )}

                    <nav className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm border relative z-10">
                        <div className="flex items-center gap-6">
                            {view !== 'library' && <button onClick={() => setView('library')} className="bg-slate-50 px-4 py-2 rounded-xl font-bold text-slate-400 hover:text-indigo-600 text-xs uppercase transition-all">← Library</button>}
                            <div>
                                <h1 className="text-xl font-black text-indigo-600 uppercase italic tracking-tighter leading-none">{view === 'library' ? 'Library' : getSafeName(activeStack?.name)}</h1>
                                <span className={`text-[9px] font-black uppercase tracking-widest mt-1 block ${syncStatus === 'syncing' ? 'text-amber-500 animate-pulse' : 'text-slate-300'}`}>Cloud {syncStatus === 'syncing' ? 'Saving...' : 'Synced'}</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            {view === 'library' ? (
                                <button onClick={() => { const n = prompt("Name:"); if(n) createStack(n); }} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black text-xs uppercase shadow-lg shadow-indigo-100">+ New</button>
                            ) : view === 'edit' ? (
                                <>
                                    <button onClick={() => setShowBorrowModal(true)} className="bg-emerald-500 text-white px-5 py-3 rounded-xl font-black text-xs uppercase">Borrow</button>
                                    <button onClick={startReview} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase shadow-lg shadow-indigo-100">Review</button>
                                </>
                            ) : (
                                <button onClick={() => setShowNotes(!showNotes)} className={`px-6 py-3 rounded-xl font-black text-xs uppercase transition-all ${showNotes ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-slate-100 text-slate-500'}`}>Notepad</button>
                            )}
                        </div>
                    </nav>

                    {view === 'library' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            {stacks.map(s => (
                                <div key={s.id} onClick={() => openStack(s)} className="bg-white p-10 rounded-[3rem] border border-slate-100 hover:border-indigo-400 cursor-pointer transition-all shadow-sm hover:shadow-2xl relative group">
                                    <div className="w-12 h-12 bg-indigo-50 rounded-xl mb-6 group-hover:bg-indigo-600 transition-colors flex items-center justify-center text-indigo-600 group-hover:text-white font-black text-xl italic shadow-inner">S</div>
                                    <h3 className="font-black text-slate-800 text-lg uppercase leading-none">{getSafeName(s.name)}</h3>
                                    <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest mt-2">{s.count} Cards</p>
                                    <button onClick={(e) => { e.stopPropagation(); deleteStack(s.id, e); }} className="absolute top-10 right-10 text-slate-100 hover:text-rose-500 font-black transition-colors text-xl">×</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'edit' && activeStack && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
                            {activeStack.cardIds?.map(cid => {
                                const card = masterLibrary[cid];
                                if(!card) return null;
                                return (
                                    <div key={cid} className="bg-white rounded-[2.5rem] border h-[520px] flex flex-col overflow-hidden shadow-sm hover:border-indigo-200 transition-all">
                                        <div className="p-6 flex flex-col h-full gap-4">
                                            <input className="w-full font-black text-lg outline-none bg-transparent border-b border-transparent focus:border-indigo-200 pb-1" placeholder="Untitled" value={card.header} onChange={e => updateCardData(cid, {header: e.target.value})} />
                                            <div className="bg-slate-900 rounded-[1.5rem] aspect-[4/3] flex items-center justify-center overflow-hidden shrink-0 shadow-inner">
                                                {card.image ? <img src={card.image} loading="lazy" className="w-full h-full object-contain" /> : <span className="text-white/20 font-black text-[9px] uppercase tracking-widest">No Image</span>}
                                            </div>
                                            <textarea className="flex-grow w-full text-slate-500 text-sm outline-none resize-none bg-slate-50 p-5 rounded-2xl border-transparent focus:bg-white border focus:border-slate-100 font-medium leading-relaxed" placeholder="Notes..." value={card.description} onChange={e => updateCardData(cid, {description: e.target.value})} />
                                            <div className="flex justify-end pt-2">
                                                <button onClick={() => removeCard(cid)} className="bg-slate-50 px-4 py-2 rounded-xl text-[9px] font-black text-slate-300 hover:text-rose-500 hover:bg-rose-50 uppercase tracking-widest transition-all">Remove</button>
                                            </div>
                                        </div>
                                    </div>
                                )
                            })}
                            <button onClick={addNewCard} className="border-4 border-dashed border-slate-200 rounded-[3rem] h-[520px] text-slate-200 text-6xl hover:text-indigo-400 bg-white/40 transition-all">+</button>
                        </div>
                    )}

                    {view === 'review' && (
                        <div className="flex gap-8 relative pb-56">
                            <div className={`flex-grow transition-all duration-500 ${showNotes ? 'w-2/3' : 'w-full'}`}>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {[0, 1, 2].map(i => {
                                        const cid = reviewRows[currentRow]?.[i];
                                        const card = masterLibrary[cid];
                                        return (
                                            <div key={i} className="flex flex-col gap-4">
                                                <div className="text-center font-bold text-indigo-200 text-[10px] tracking-widest uppercase italic">Pos {String.fromCharCode(65+i)}</div>
                                                <div className={`rounded-[3.5rem] border-4 p-8 h-[550px] transition-all flex flex-col ${card ? 'bg-white shadow-xl border-white hover:border-indigo-100' : 'bg-slate-100 border-dashed border-slate-200 flex items-center justify-center'}`}>
                                                    {card ? (
                                                        <div className="h-full flex flex-col overflow-hidden">
                                                            <input className="w-full text-2xl font-black mb-4 outline-none bg-transparent" value={card.header} onChange={e => updateCardData(cid, {header: e.target.value})} />
                                                            {card.image && (
                                                                <div className="bg-black rounded-3xl overflow-hidden mb-4 aspect-video flex items-center justify-center cursor-zoom-in group shrink-0" onClick={() => setZoomUrl(card.image)}>
                                                                    <img src={card.image} className="w-full h-full object-contain" />
                                                                </div>
                                                            )}
                                                            <textarea className="flex-1 w-full text-slate-500 text-base outline-none resize-none font-medium leading-relaxed bg-transparent" value={card.description} onChange={e => updateCardData(cid, {description: e.target.value})} />
                                                        </div>
                                                    ) : <span className="text-slate-300 uppercase font-black text-xs">Empty</span>}
                                                </div>
                                                {card && (
                                                    <div className="flex justify-center gap-2">
                                                        <button disabled={i===0} onClick={()=>swap(currentRow, i, i-1)} className="bg-white px-6 py-3 rounded-2xl shadow font-bold text-[10px] disabled:opacity-20 active:scale-90 transition-all border uppercase tracking-widest">← Swap</button>
                                                        <button disabled={i===2 || !reviewRows[currentRow][i+1]} onClick={()=>swap(currentRow, i, i+1)} className="bg-white px-6 py-3 rounded-2xl shadow font-bold text-[10px] disabled:opacity-20 active:scale-90 transition-all border uppercase tracking-widest">Swap →</button>
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                            {showNotes && (
                                <div className="w-1/3 min-w-[340px] h-[640px] bg-white border-4 border-indigo-100 rounded-[3.5rem] shadow-2xl flex flex-col overflow-hidden sticky top-8 animate-in slide-in-from-right duration-300">
                                    <div className="bg-indigo-50 p-8 border-b border-indigo-100">
                                        <h2 className="font-black text-indigo-600 uppercase italic tracking-tighter">Study Notes</h2>
                                    </div>
                                    <textarea className="flex-1 p-8 text-slate-600 text-base outline-none resize-none font-medium leading-relaxed bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] [background-size:24px_24px]" placeholder="Stack notes..." value={activeStack.notes || ""} onChange={(e) => handleStackNotes(e.target.value)} />
                                </div>
                            )}

                            <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t p-8 flex flex-col items-center gap-4 z-50">
                                <div className="bg-indigo-600 text-white px-8 py-2 rounded-full font-black text-[10px] uppercase tracking-widest">Set {currentRow + 1} / {reviewRows.length}</div>
                                <div className="flex gap-4">
                                    <button onClick={() => setView('edit')} className="bg-slate-100 px-12 py-5 rounded-[2rem] font-black text-xs text-slate-400 uppercase tracking-widest">Exit</button>
                                    {currentRow < reviewRows.length - 1 ? 
                                        <button onClick={()=>setCurrentRow(currentRow+1)} className="bg-indigo-600 text-white px-24 py-6 rounded-[2rem] font-black text-lg shadow-xl uppercase tracking-widest">Next Set</button> :
                                        <button onClick={completeSweep} className="bg-emerald-600 text-white px-24 py-6 rounded-[2rem] font-black text-lg shadow-xl uppercase tracking-widest italic">Save & Sweep</button>
                                    }
                                </div>
                            </div>
                        </div>
                    )}

                    {showBorrowModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-6 z-[100] animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-6xl max-h-[85vh] rounded-[4rem] overflow-hidden flex flex-col p-16 shadow-2xl">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none tracking-tighter uppercase leading-none">Borrow Cards</h2>
                                    <button onClick={() => setShowBorrowModal(false)} className="bg-slate-100 p-8 rounded-full text-slate-300 font-black text-2xl hover:text-rose-500 transition-colors">×</button>
                                </div>
                                <div className="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 pr-4">
                                    {Object.values(masterLibrary).map(card => (
                                        <div key={card.id} className="bg-slate-50 border p-6 rounded-[3rem] flex flex-col gap-4 shadow-sm group">
                                            <h4 className="font-bold text-slate-800 text-xs truncate uppercase tracking-tighter">{card.header || "Untitled"}</h4>
                                            <div className="bg-slate-200 aspect-video rounded-3xl overflow-hidden shadow-inner flex items-center justify-center">
                                                {card.image && <img src={card.image} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />}
                                            </div>
                                            <button 
                                                disabled={activeStack.cardIds.includes(card.id)} 
                                                onClick={() => borrowCard(card.id)} 
                                                className={`w-full py-5 rounded-2xl font-black text-[10px] tracking-widest transition-all uppercase ${activeStack.cardIds.includes(card.id) ? 'bg-slate-100 text-slate-300' : 'bg-indigo-600 text-white shadow-xl hover:scale-105 active:scale-95'}`}
                                            >
                                                {activeStack.cardIds.includes(card.id) ? 'In Stack' : 'Borrow'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
