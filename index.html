<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: Senior Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .modal-enter { animation: modalEnter 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ai-shimmer { background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1); background-size: 200% auto; animation: shimmer 2s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // !!! RE-PASTE YOUR DRIVE KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyAV394dghHsGOxq1thv9EcXJzVoyvb04jE';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [token, setToken] = useState(null);
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]); 
            const [masterLibrary, setMasterLibrary] = useState({}); 
            const [activeStack, setActiveStack] = useState(null); 
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle'); // 'idle', 'syncing', 'saved', 'error'
            const [showBorrowModal, setShowBorrowModal] = useState(false);
            const [borrowSearch, setBorrowSearch] = useState('');
            const [isNotepadOpen, setIsNotepadOpen] = useState(false); 
            const [focusedCardId, setFocusedCardId] = useState(null);
            const [zoomUrl, setZoomUrl] = useState(null); 
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);
            
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [aiLoadingId, setAiLoadingId] = useState(null);

            const fileInputRef = useRef(null);
            const saveTimeoutRef = useRef(null);

            // Handle Keyboard ESC and Arrows
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setFocusedCardId(null);
                        setZoomUrl(null);
                        setShowBorrowModal(false);
                        setIsNotepadOpen(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                gapi.load('client', async () => {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                });
            }, []);

            const login = () => {
                google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => { if (res.access_token) { setToken(res.access_token); bootSystem(res.access_token); } },
                }).requestAccessToken();
            };

            const bootSystem = async (at) => {
                setIsLoading(true);
                try {
                    const mList = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                    if (mList.result.files?.[0]) {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${mList.result.files[0].id}?alt=media`, { headers: { Authorization: `Bearer ${at}` } });
                        setMasterLibrary(await res.json());
                    }
                    await refreshStacks(at);
                } catch (e) { setSyncStatus('error'); }
                setIsLoading(false);
            };

            const refreshStacks = async (at) => {
                const sList = await gapi.client.drive.files.list({ q: "mimeType = 'application/json' and name contains 'sweep_stack_'", fields: "files(id, name)" });
                const files = sList.result.files || [];
                const withCounts = await Promise.all(files.map(async (f) => {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`, { headers: { Authorization: `Bearer ${at}` } });
                    const data = await res.json();
                    return { ...f, count: Array.isArray(data) ? data.length : (data.cardIds?.length || 0) };
                }));
                setStacks(withCounts);
            };

            const saveMaster = async (nl) => {
                setSyncStatus('syncing');
                const list = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                const id = list.result.files[0]?.id;
                const blob = new Blob([JSON.stringify(nl)], { type: 'application/json' });
                try {
                    if (id) { await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, { method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob }); }
                    else {
                        const meta = { name: 'sweep_master_library.json', mimeType: 'application/json' };
                        const form = new FormData();
                        form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                        form.append('file', blob);
                        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form });
                    }
                    setSyncStatus('saved');
                } catch (e) { setSyncStatus('error'); }
            };

            const saveStackFile = async (sid, ids, notes) => {
                setSyncStatus('syncing');
                const blob = new Blob([JSON.stringify({ cardIds: ids, notes: notes || "" })], { type: 'application/json' });
                try {
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${sid}?uploadType=media`, { method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob });
                    setSyncStatus('saved');
                } catch (e) { setSyncStatus('error'); }
            };

            const openStack = async (stack) => {
                setIsLoading(true);
                try {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${stack.id}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
                    const data = await res.json();
                    setActiveStack({ ...stack, cardIds: Array.isArray(data) ? data : (data.cardIds || []), notes: data.notes || "" });
                    setView('edit');
                } catch (e) { setSyncStatus('error'); }
                setIsLoading(false);
            };

            const updateCard = (cid, updates) => {
                const nl = { ...masterLibrary, [cid]: { ...masterLibrary[cid], ...updates } };
                setMasterLibrary(nl);
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                saveTimeoutRef.current = setTimeout(() => saveMaster(nl), 2000);
            };

            const generateAiExamples = async (cid) => {
                if (!geminiKey) {
                    const k = prompt("Paste Gemini API Key:"); if (!k) return;
                    setGeminiKey(k); localStorage.setItem('gemini_api_key', k);
                }
                const card = masterLibrary[cid];
                setAiLoadingId(cid);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Topic: ${card.header}\nNotes: ${card.description}\nTask: Give 3 real-world examples. Be brief. Format: AI EXAMPLES:\n• Example 1\n• Example 2\n• Example 3` }] }] })
                    });
                    const data = await res.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    updateCard(cid, { description: card.description + "\n\n" + aiText });
                } catch (e) { alert("AI Service Error"); }
                setAiLoadingId(null);
            };

            const filteredLibrary = useMemo(() => {
                return Object.values(masterLibrary).filter(c => 
                    c.header.toLowerCase().includes(borrowSearch.toLowerCase())
                );
            }, [masterLibrary, borrowSearch]);

            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-center p-6">
                    <div className="bg-white p-12 md:p-20 rounded-[4rem] shadow-2xl max-w-sm w-full modal-enter">
                        <h1 className="text-5xl font-black text-indigo-600 mb-2 italic tracking-tighter uppercase leading-none">Sweep Pro</h1>
                        <p className="text-slate-400 mb-10 font-medium">Study better with Cloud & AI</p>
                        <button onClick={login} className="w-full bg-indigo-600 text-white px-8 py-5 rounded-[2rem] font-black text-lg hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100">START SESSION</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white"><div className="loading-spin mb-4"></div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Syncing Cloud...</p></div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    
                    {zoomUrl && <div className="fixed inset-0 z-[6000] bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setZoomUrl(null)}><img src={zoomUrl} className="max-w-full max-h-full object-contain modal-enter shadow-2xl" /></div>}

                    {/* CENTRAL FOCUS MODAL */}
                    {focusedCardId && masterLibrary[focusedCardId] && (
                        <div className="fixed inset-0 z-[4000] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 md:p-10">
                            <div className="bg-white w-full max-w-5xl h-[90vh] rounded-[3.5rem] shadow-2xl flex flex-col overflow-hidden modal-enter">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50 shrink-0">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Quick Editor</span>
                                    <button onClick={() => setFocusedCardId(null)} className="text-slate-400 hover:text-rose-500 font-black text-3xl">×</button>
                                </div>
                                <div className="flex-1 flex flex-col p-6 md:p-10 space-y-6 overflow-hidden">
                                    <input className="w-full text-4xl font-black outline-none border-b-4 border-slate-100 focus:border-indigo-500 pb-2 shrink-0 transition-colors" value={masterLibrary[focusedCardId].header} placeholder="Card Title" onChange={e => updateCard(focusedCardId, {header: e.target.value})} />
                                    <div className="flex flex-col md:flex-row gap-10 flex-1 overflow-hidden">
                                        <div className="w-full md:w-2/5 flex flex-col gap-4 shrink-0">
                                            <div className="bg-slate-900 rounded-[2.5rem] aspect-square overflow-hidden shadow-2xl flex items-center justify-center relative group">
                                                {masterLibrary[focusedCardId].image ? <img src={masterLibrary[focusedCardId].image} className="w-full h-full object-contain" /> : <span className="text-white/10 font-black uppercase text-xs">No Photo</span>}
                                                <label className="absolute inset-0 bg-indigo-600/80 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer text-white font-black text-[10px] uppercase tracking-widest">Update Image<input type="file" hidden accept="image/*" onChange={e => { const r = new FileReader(); r.onload = ev => updateCard(focusedCardId, {image: ev.target.result}); r.readAsDataURL(e.target.files[0]); }} /></label>
                                            </div>
                                            <button onClick={() => setZoomUrl(masterLibrary[focusedCardId].image)} className="text-[10px] font-black text-indigo-400 uppercase tracking-widest hover:text-indigo-600 transition-colors">Expand View</button>
                                        </div>
                                        <div className="flex-1 flex flex-col min-h-0 bg-slate-50 rounded-[2.5rem] p-1 shadow-inner">
                                            <textarea className="flex-1 w-full bg-transparent p-8 text-xl font-medium outline-none resize-none leading-relaxed overflow-y-auto" placeholder="Detailed notes go here..." value={masterLibrary[focusedCardId].description} onChange={e => updateCard(focusedCardId, {description: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MASTER NOTEPAD DRAWER */}
                    <div className={`fixed top-0 right-0 h-full w-80 md:w-[450px] bg-slate-900 text-white z-[5001] drawer-transition p-10 flex flex-col ${isNotepadOpen ? 'translate-x-0 shadow-[-50px_0_100px_rgba(0,0,0,0.5)]' : 'translate-x-full'}`}>
                        <div className="flex justify-between items-center mb-10 shrink-0">
                            <h2 className="text-xs font-black text-indigo-400 uppercase tracking-widest italic">Collection Brain</h2>
                            <button onClick={() => setIsNotepadOpen(false)} className="text-slate-500 hover:text-white font-bold text-3xl">×</button>
                        </div>
                        <textarea className="flex-1 w-full bg-slate-800/50 p-8 rounded-[2rem] text-base font-medium outline-none border-none resize-none leading-relaxed text-slate-200 shadow-inner" placeholder="Jot down overall themes..." value={activeStack?.notes || ""} onChange={(e) => { const us = { ...activeStack, notes: e.target.value }; setActiveStack(us); saveStackFile(us.id, us.cardIds, e.target.value); }} />
                    </div>

                    {/* HEADER NAV */}
                    <nav className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <div className="flex items-center gap-4">
                            {view !== 'library' && <button onClick={() => setView('library')} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-full font-bold hover:bg-slate-100">←</button>}
                            <div>
                                <h1 className="text-xl font-black text-indigo-600 uppercase italic truncate max-w-[200px]">{view === 'library' ? 'Stacks' : activeStack.name.replace('sweep_stack_', '').replace('.json', '')}</h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <div className={`w-2 h-2 rounded-full ${syncStatus === 'syncing' ? 'bg-amber-400 animate-pulse' : syncStatus === 'error' ? 'bg-rose-500' : 'bg-emerald-500'}`}></div>
                                    <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest">{syncStatus === 'syncing' ? 'Syncing...' : 'Connected'}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            {view === 'library' ? (
                                <button onClick={() => { const n = prompt("Stack Name:"); if(n) { setIsLoading(true); const m = { name: `sweep_stack_${n}.json`, mimeType: 'application/json' }; const b = new Blob([JSON.stringify({ cardIds: [], notes: "" })], { type: 'application/json' }); const f = new FormData(); f.append('metadata', new Blob([JSON.stringify(m)], { type: 'application/json' })); f.append('file', b); fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: f }).then(() => bootSystem(token)); } }} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-black text-xs uppercase shadow-lg hover:scale-105 transition-transform">+ NEW STACK</button>
                            ) : view === 'edit' ? (
                                <>
                                    <button onClick={() => setShowBorrowModal(true)} className="bg-emerald-500 text-white px-5 py-3 rounded-xl font-bold text-[10px] uppercase shadow-md">Borrow</button>
                                    <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 text-white px-5 py-3 rounded-xl font-bold text-[10px] uppercase">Bulk</button>
                                    <button onClick={() => { const rs = []; for (let i = 0; i < activeStack.cardIds.length; i += 3) rs.push(activeStack.cardIds.slice(i, i + 3)); setReviewRows(rs); setCurrentRow(0); setView('review'); window.scrollTo(0,0); }} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-indigo-100">Review</button>
                                    <input type="file" multiple hidden ref={fileInputRef} onChange={(e) => { const fs = Array.from(e.target.files); setIsLoading(true); let p=0; let tl={...masterLibrary}; let ti=[...activeStack.cardIds]; fs.forEach(f => { const r = new FileReader(); r.onload = ev => { const id = "c_" + Math.random().toString(36).substr(2, 9); tl[id] = { id, header: f.name.split('.')[0], description: '', image: ev.target.result }; ti.push(id); p++; if (p === fs.length) { setMasterLibrary(tl); setActiveStack({...activeStack, cardIds: ti}); saveMaster(tl); saveStackFile(activeStack.id, ti, activeStack.notes); setIsLoading(false); } }; r.readAsDataURL(f); }); }} />
                                </>
                            ) : <button onClick={() => setIsNotepadOpen(true)} className="bg-slate-900 text-white px-6 py-3 rounded-full font-bold text-[10px] uppercase tracking-widest border border-slate-700">Open Notes</button>}
                        </div>
                    </nav>

                    {/* LIBRARY GRID */}
                    {view === 'library' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {stacks.map(s => (
                                <div key={s.id} onClick={() => openStack(s)} className="bg-white p-10 rounded-[3rem] border border-slate-100 hover:border-indigo-400 cursor-pointer transition-all shadow-sm group relative">
                                    <div className="w-14 h-14 bg-indigo-50 rounded-[1.5rem] mb-4 flex items-center justify-center text-indigo-600 font-black italic shadow-inner group-hover:bg-indigo-600 group-hover:text-white transition-colors">S</div>
                                    <h3 className="font-black text-slate-700 text-xl uppercase truncate leading-none mb-2">{s.name.replace('sweep_stack_', '').replace('.json', '')}</h3>
                                    <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{s.count} Synced Items</p>
                                    <button onClick={(e) => { e.stopPropagation(); if(confirm('Permanently delete this entire collection?')) { setIsLoading(true); gapi.client.drive.files.delete({ fileId: s.id }).then(() => bootSystem(token)); } }} className="absolute top-8 right-8 text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity font-black text-xl">×</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* EDIT GRID */}
                    {view === 'edit' && activeStack && (
                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6 pb-40">
                            {activeStack.cardIds.map(cid => {
                                const card = masterLibrary[cid]; if(!card) return null;
                                return (
                                    <div key={cid} onClick={() => setFocusedCardId(cid)} className={`bg-white rounded-3xl border-2 cursor-pointer transition-all p-4 shadow-sm flex flex-col h-[280px] group ${focusedCardId === cid ? 'border-indigo-500 scale-95 shadow-xl' : 'border-transparent hover:border-indigo-100 hover:-translate-y-1'}`}>
                                        <div className="aspect-video bg-slate-900 rounded-2xl overflow-hidden mb-3 shadow-inner">
                                            {card.image && <img src={card.image} className="w-full h-full object-contain opacity-80" loading="lazy" />}
                                        </div>
                                        <h4 className="font-black text-[11px] uppercase truncate mb-1 text-slate-800">{card.header || "Untitled"}</h4>
                                        <p className="text-[9px] text-slate-400 font-medium line-clamp-2 leading-tight overflow-hidden">{card.description || "Click to add details..."}</p>
                                        <div className="mt-auto pt-3 flex justify-between items-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <span className="text-[8px] font-black text-slate-200 uppercase">Synced</span>
                                            <button onClick={(e) => {e.stopPropagation(); if(confirm('Remove this card from stack?')) { const ni = activeStack.cardIds.filter(id => id !== cid); setActiveStack({...activeStack, cardIds: ni}); saveStackFile(activeStack.id, ni, activeStack.notes); } }} className="text-[9px] font-black text-rose-300 hover:text-rose-500 uppercase tracking-tighter">Remove</button>
                                        </div>
                                    </div>
                                )
                            })}
                            <button onClick={() => { const id = "c_" + Date.now(); const nl = { ...masterLibrary, [id]: { id, header: '', description: '', image: null } }; const ni = [...activeStack.cardIds, id]; setMasterLibrary(nl); setActiveStack({...activeStack, cardIds: ni}); saveMaster(nl); saveStackFile(activeStack.id, ni, activeStack.notes); setFocusedCardId(id); }} className="border-4 border-dashed border-slate-200 rounded-3xl h-[280px] text-slate-200 text-6xl hover:text-indigo-400 hover:bg-white/50 transition-all">+</button>
                        </div>
                    )}

                    {/* REVIEW MODE */}
                    {view === 'review' && (
                        <div className="animate-in fade-in duration-500 pb-32">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                {[0, 1, 2].map(i => {
                                    const cid = reviewRows[currentRow]?.[i]; const card = masterLibrary[cid];
                                    return (
                                        <div key={i} className="flex flex-col gap-3">
                                            <div className="text-center font-black text-indigo-200 text-[10px] tracking-widest uppercase italic leading-none">Slot {String.fromCharCode(65+i)}</div>
                                            <div className={`rounded-[3rem] border-2 p-10 h-[550px] flex flex-col transition-all duration-500 ${card ? 'bg-white shadow-2xl border-white' : 'bg-slate-100 border-dashed border-slate-200'}`}>
                                                {card && (
                                                    <div className="h-full flex flex-col overflow-hidden">
                                                        <div className="flex justify-between items-start mb-6">
                                                            <input className="flex-1 text-2xl font-black outline-none border-none bg-transparent leading-none" value={card.header} onChange={e => updateCard(cid, {header: e.target.value})} />
                                                            <button onClick={() => generateAiExamples(cid)} className={`w-9 h-9 rounded-full flex items-center justify-center transition-all ${aiLoadingId === cid ? 'loading-spin' : 'bg-indigo-50 text-indigo-600 hover:scale-110'}`} title="AI Examples">
                                                                {aiLoadingId === cid ? '' : '✨'}
                                                            </button>
                                                        </div>
                                                        {card.image && <div className="bg-black rounded-[2rem] overflow-hidden mb-6 aspect-video flex items-center justify-center cursor-zoom-in shadow-xl shrink-0" onClick={() => setZoomUrl(card.image)}><img src={card.image} className="w-full h-full object-contain" /></div>}
                                                        <textarea className="flex-1 w-full text-slate-500 text-base outline-none resize-none bg-transparent font-medium leading-relaxed" placeholder="Click to add notes..." value={card.description} onChange={e => { updateCard(cid, {description: e.target.value}); e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }} />
                                                    </div>
                                                )}
                                            </div>
                                            {card && (
                                                <div className="flex justify-center gap-3">
                                                    <button disabled={i===0} onClick={()=> {const nr = [...reviewRows]; const r = [...nr[currentRow]]; [r[i], r[i-1]] = [r[i-1], r[i]]; nr[currentRow] = r; setReviewRows(nr);}} className="bg-white px-6 py-2 rounded-2xl shadow-sm font-black text-[10px] disabled:opacity-20 active:scale-95 border uppercase">←</button>
                                                    <button disabled={i===2 || !reviewRows[currentRow][i+1]} onClick={()=> {const nr = [...reviewRows]; const r = [...nr[currentRow]]; [r[i], r[i+1]] = [r[i+1], r[i]]; nr[currentRow] = r; setReviewRows(nr);}} className="bg-white px-6 py-2 rounded-2xl shadow-sm font-black text-[10px] disabled:opacity-20 active:scale-95 border">→</button>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>

                            {/* STICKY FOOTER */}
                            <div className="fixed bottom-8 left-0 right-0 flex justify-center z-[2000] px-6">
                                <div className="bg-white/80 backdrop-blur-xl border border-slate-200 p-3 rounded-full shadow-[0_25px_60px_rgba(0,0,0,0.15)] flex items-center gap-6">
                                    <button onClick={() => setView('edit')} className="pl-6 pr-2 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-rose-500 transition-colors">Exit</button>
                                    <div className="h-10 w-[1px] bg-slate-200"></div>
                                    <div className="px-2">
                                        <span className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em]">Set {currentRow + 1} of {reviewRows.length}</span>
                                    </div>
                                    {currentRow < reviewRows.length - 1 ? 
                                        <button onClick={()=>{setCurrentRow(currentRow+1); window.scrollTo(0,0);}} className="bg-indigo-600 text-white px-12 py-4 rounded-full font-black text-xs uppercase tracking-widest hover:bg-indigo-700 shadow-xl transition-all">Next Set</button> :
                                        <button onClick={async () => { setSyncStatus('syncing'); const a=[], b=[], c=[]; reviewRows.forEach(r => { if(r[0]) a.push(r[0]); if(r[1]) b.push(r[1]); if(r[2]) c.push(r[2]); }); const ni = [...a, ...b, ...c]; await saveStackFile(activeStack.id, ni, activeStack.notes); setActiveStack({...activeStack, cardIds: ni}); setView('edit'); }} className="bg-emerald-600 text-white px-12 py-4 rounded-full font-black text-xs uppercase tracking-widest shadow-xl italic">Sweep & Save</button>
                                    }
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SEARCHABLE BORROW MODAL */}
                    {showBorrowModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-6 z-[5002] animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-6xl max-h-[85vh] rounded-[4rem] overflow-hidden flex flex-col p-12 shadow-2xl modal-enter">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 shrink-0">
                                    <h2 className="text-3xl font-black text-indigo-600 italic uppercase">Master Sync Library</h2>
                                    <div className="flex-1 max-w-md w-full relative">
                                        <input className="w-full bg-slate-100 border-none rounded-2xl px-12 py-4 font-medium focus:ring-4 ring-indigo-50" placeholder="Search cards by name..." value={borrowSearch} onChange={e => setBorrowSearch(e.target.value)} />
                                        <span className="absolute left-5 top-1/2 -translate-y-1/2 opacity-30">🔍</span>
                                    </div>
                                    <button onClick={() => {setShowBorrowModal(false); setBorrowSearch('');}} className="text-4xl text-slate-300 hover:text-rose-500 font-bold transition-colors">×</button>
                                </div>
                                <div className="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6 pr-4">
                                    {filteredLibrary.map(card => (
                                        <div key={card.id} className="bg-slate-50 border p-5 rounded-[2rem] flex flex-col gap-3 group">
                                            <h4 className="font-black text-slate-800 text-[10px] uppercase truncate tracking-tighter">{card.header || "Untitled"}</h4>
                                            <div className="bg-slate-200 aspect-video rounded-2xl overflow-hidden shadow-inner">{card.image && <img src={card.image} className="w-full h-full object-cover grayscale opacity-50 group-hover:grayscale-0 transition-all" />}</div>
                                            <button disabled={activeStack.cardIds.includes(card.id)} onClick={() => { const ni = [...activeStack.cardIds, card.id]; setActiveStack({...activeStack, cardIds: ni}); saveStackFile(activeStack.id, ni, activeStack.notes); }} className={`w-full py-3 rounded-xl font-bold text-[9px] tracking-widest ${activeStack.cardIds.includes(card.id) ? 'bg-slate-200 text-slate-400' : 'bg-indigo-600 text-white shadow-lg'}`}>{activeStack.cardIds.includes(card.id) ? 'LINKED' : 'ADD TO STACK'}</button>
                                        </div>
                                    ))}
                                    {filteredLibrary.length === 0 && <div className="col-span-full py-20 text-center text-slate-300 font-black italic uppercase">No cards match that search...</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
