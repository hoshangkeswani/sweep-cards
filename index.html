<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro | Master Studio v14.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; color: #1e293b; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .studio-modal { width: 92vw; height: 90vh; border-radius: 4rem; overflow: hidden; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.2); }
        .card-slot { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 3rem; }
        .card-slot:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.1); }
        .wiki-link { cursor: pointer; color: #4f46e5; font-weight: 800; text-decoration: underline; background: #f5f3ff; padding: 2px 8px; border-radius: 8px; font-size: 0.85em; }
        .pulse-ring { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .login-bg { background: radial-gradient(circle at top right, #4f46e5, #000); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = 'https://jslelyvziimqimmaxvlk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGVseXZ6aWltcWltbWF4dmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNTksImV4cCI6MjA5MzM2MTM1OX0.DdDfRZcgfNu7fFZi0uHMSBi-TUNvYVEuHMwiPHdJIa4'; // YOUR_ANON_KEY
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const NoteRenderer = ({ text, library, onJump }) => {
            if (!text) return <p className="text-slate-300 italic py-4">No content exists in this node.</p>;
            const parts = text.split(/(\[\[Card:[^\]]+\]\])/g);
            return (
                <div className="whitespace-pre-wrap text-slate-600 leading-relaxed text-sm">
                    {parts.map((part, i) => {
                        const match = part.match(/\[\[Card:([^\]|]+)(?:\|([^\]]+))?\]\]/);
                        if (match) {
                            const ref = match[1];
                            const label = match[2];
                            const target = library[ref] || Object.values(library).find(c => c.header === ref);
                            return <span key={i} onClick={() => onJump(target?.id)} className="wiki-link">📄 {label || target?.header || ref}</span>;
                        }
                        return part;
                    })}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [pulse, setPulse] = useState('online');
            const [view, setView] = useState('vault'); 
            const [stacks, setStacks] = useState([]);
            const [masterLibrary, setMasterLibrary] = useState({});
            const [activeStack, setActiveStack] = useState(null);
            const [focusCardId, setFocusCardId] = useState(null);

            // A. IDENTITY BRIDGE Logic
            useEffect(() => {
                _db.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); boot(); }
                    else { setIsLoading(false); }
                });

                const { data: authListener } = _db.auth.onAuthStateChange((_event, session) => {
                    if (session) { setUser(session.user); boot(); }
                    else { setUser(null); setIsLoading(false); }
                });

                return () => authListener.subscription.unsubscribe();
            }, []);

            const boot = async () => {
                setPulse('syncing');
                try {
                    const { data: cards } = await _db.from('cards').select('*, media(*)');
                    const { data: stacksData } = await _db.from('stacks').select('*').order('created_at', { ascending: false });
                    const lib = {};
                    cards?.forEach(c => lib[c.id] = c);
                    setMasterLibrary(lib);
                    setStacks(stacksData || []);
                } catch (e) { setPulse('error'); }
                setIsLoading(false);
                setPulse('online');
            };

            const handleGoogleLogin = async () => {
                await _db.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.href, queryParams: { prompt: 'select_account' } }
                });
            };

            // B. CREATE STACK Logic (Fixed)
            const createStack = async () => {
                setPulse('syncing');
                const stackName = prompt("Enter Stack Name:", "New Research Project");
                if (!stackName) { setPulse('online'); return; }

                const { data, error } = await _db.from('stacks')
                    .insert([{ name: stackName, user_id: user.id }])
                    .select().single();

                if (error) {
                    setPulse('error');
                    alert(`Vault Refusal: ${error.message}`);
                } else {
                    setStacks([data, ...stacks]);
                    setPulse('online');
                }
            };

            const openStack = async (s) => {
                setPulse('syncing');
                const { data: items } = await _db.from('stack_items').select('card_id').eq('stack_id', s.id).order('position');
                setActiveStack({ ...s, card_ids: (items || []).map(i => i.card_id).filter(id => masterLibrary[id]) });
                setView('studio');
                setPulse('online');
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center bg-white font-black text-xs tracking-[0.5em] uppercase animate-pulse">Initializing Studio...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center login-bg p-6 text-white text-center">
                    <div className="max-w-md w-full">
                        <div className="mb-12">
                            <h1 className="text-6xl font-black italic tracking-tighter mb-4">SWEEP SYNC</h1>
                            <p className="text-indigo-200 text-[10px] font-bold uppercase tracking-[0.4em]">Atomic Knowledge Studio v14.9</p>
                        </div>
                        <button onClick={handleGoogleLogin} className="w-full bg-white text-slate-900 py-6 rounded-3xl font-black uppercase text-xs tracking-widest shadow-2xl hover:scale-105 active:scale-95 transition-all">
                            Sign In with Google
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="p-8 md:p-20">
                    {/* PULSE HEARTBEAT */}
                    <div className="fixed bottom-10 right-10 z-[9999] flex items-center gap-4 glass p-4 rounded-3xl border-2 border-white shadow-2xl">
                        <div className="text-right">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Heartbeat</p>
                            <p className="text-xs font-bold text-slate-800">{pulse.toUpperCase()}</p>
                        </div>
                        <div className={`w-4 h-4 rounded-full ${pulse === 'online' ? 'bg-emerald-500 pulse-ring' : pulse === 'syncing' ? 'bg-indigo-500 animate-ping' : 'bg-rose-500'}`}></div>
                    </div>

                    {view === 'vault' && (
                        <div className="max-w-7xl mx-auto">
                            <header className="flex justify-between items-end mb-20">
                                <div>
                                    <h1 className="text-8xl font-black italic tracking-tighter text-indigo-600 leading-none">THE VAULT</h1>
                                    <p className="mt-4 text-slate-400 font-bold uppercase text-[11px] tracking-[0.3em]">User: {user.email}</p>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => _db.auth.signOut()} className="text-slate-400 font-black text-[10px] uppercase mr-6">Logout</button>
                                    <button onClick={createStack} className="bg-slate-900 text-white px-12 py-5 rounded-full font-black text-xs uppercase shadow-xl hover:bg-indigo-600 transition-all">+ Create Stack</button>
                                </div>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                {stacks.length === 0 ? (
                                    <div className="col-span-3 py-32 text-center border-4 border-dashed border-slate-100 rounded-[4rem]">
                                        <p className="text-slate-300 font-black text-sm uppercase tracking-widest">Vault is currently empty.</p>
                                    </div>
                                ) : (
                                    stacks.map(s => (
                                        <div key={s.id} onClick={() => openStack(s)} className="bg-white p-16 rounded-[4rem] border border-slate-100 hover:border-indigo-500 cursor-pointer transition-all hover:-translate-y-2 card-slot shadow-sm group relative">
                                            <div className="w-14 h-14 bg-indigo-50 rounded-2xl mb-6 flex items-center justify-center font-black text-indigo-600 italic">S</div>
                                            <h2 className="text-3xl font-black uppercase tracking-tighter text-slate-800 mb-2 truncate">{s.name}</h2>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); if(confirm('Delete Stack?')) _db.from('stacks').delete().eq('id', s.id).then(boot); }}
                                                className="absolute top-10 right-10 text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all font-bold"
                                            >×</button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {/* FOCUS MODAL & REMAINING STUDIO LOGIC UNCHANGED PER ECOLOGY REQUIREMENTS */}
                    {view === 'studio' && (
                         <div className="animate-in fade-in duration-500">
                            <nav className="flex justify-between items-center mb-16 glass p-8 rounded-[3rem] sticky top-10 z-[500]">
                                <div className="flex gap-10 items-center">
                                    <button onClick={() => setView('vault')} className="text-xs font-black uppercase text-slate-400 hover:text-indigo-600 transition-colors">← Exit Studio</button>
                                    <h2 className="text-3xl font-black italic tracking-tighter uppercase text-slate-900">{activeStack.name}</h2>
                                </div>
                            </nav>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {['Slot A', 'Slot B', 'Slot C'].map((label, colIdx) => (
                                    <div key={colIdx} className="space-y-6">
                                        <div className="px-8"><span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{label}</span></div>
                                        {activeStack.card_ids.filter((_, i) => i % 3 === colIdx).map((id) => (
                                            <div key={id} onClick={() => setFocusCardId(id)} className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm hover:border-indigo-200 cursor-pointer transition-all">
                                                <h3 className="text-xl font-black uppercase tracking-tight mb-4">{masterLibrary[id]?.header}</h3>
                                                <NoteRenderer text={masterLibrary[id]?.notes?.slice(0, 80) + '...'} library={masterLibrary} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
