<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro | Master Studio v14.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; color: #1e293b; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .studio-modal { width: 92vw; height: 90vh; border-radius: 4rem; overflow: hidden; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.2); }
        .card-slot { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 3rem; }
        .card-slot:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.1); }
        .wiki-link { cursor: pointer; color: #4f46e5; font-weight: 800; text-decoration: underline; background: #f5f3ff; padding: 2px 8px; border-radius: 8px; font-size: 0.85em; }
        .media-snap { scroll-snap-type: x mandatory; }
        .media-snap > * { scroll-snap-align: start; }
        .pulse-ring { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- DATABASE INIT ---
        const SUPABASE_URL = 'https://jslelyvziimqimmaxvlk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGVseXZ6aWltcWltbWF4dmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNTksImV4cCI6MjA5MzM2MTM1OX0.DdDfRZcgfNu7fFZi0uHMSBi-TUNvYVEuHMwiPHdJIa4'; // ENTER KEY
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- COMPONENTS ---

        const MediaGallery = ({ media, kinetic = true }) => (
            <div className={`flex gap-4 overflow-x-auto pb-4 media-snap no-scrollbar`}>
                {media.map((m, i) => (
                    <div key={i} className="min-w-[280px] h-[180px] rounded-[2rem] overflow-hidden bg-slate-100 flex-shrink-0 border border-white">
                        {m.type === 'video' ? (
                            <video src={m.url} autoPlay muted loop playsInline className="w-full h-full object-cover" />
                        ) : (
                            <img src={m.url} className="w-full h-full object-cover" />
                        )}
                    </div>
                ))}
            </div>
        );

        const NoteRenderer = ({ text, library, onJump }) => {
            if (!text) return <p className="text-slate-300 italic py-4">No content exists in this node.</p>;
            const parts = text.split(/(\[\[Card:[^\]]+\]\])/g);
            return (
                <div className="whitespace-pre-wrap text-slate-600 leading-relaxed text-sm">
                    {parts.map((part, i) => {
                        const match = part.match(/\[\[Card:([^\]|]+)(?:\|([^\]]+))?\]\]/);
                        if (match) {
                            const ref = match[1];
                            const label = match[2];
                            const target = library[ref] || Object.values(library).find(c => c.header === ref);
                            return <span key={i} onClick={() => onJump(target?.id)} className="wiki-link">📄 {label || target?.header || ref}</span>;
                        }
                        return part;
                    })}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [pulse, setPulse] = useState('online');
            const [view, setView] = useState('vault'); // vault | studio
            const [stacks, setStacks] = useState([]);
            const [masterLibrary, setMasterLibrary] = useState({});
            const [activeStack, setActiveStack] = useState(null);
            const [focusCardId, setFocusCardId] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");

            useEffect(() => {
                _db.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); boot(); }
                });
            }, []);

            const boot = async () => {
                setPulse('syncing');
                const { data: cards } = await _db.from('cards').select('*, media(*)');
                const { data: stacksData } = await _db.from('stacks').select('*').order('created_at', { ascending: false });
                
                const lib = {};
                cards?.forEach(c => lib[c.id] = c);
                setMasterLibrary(lib);
                setStacks(stacksData || []);
                setPulse('online');
            };

            const handleHarvest = async () => {
                setPulse('syncing');
                // Logic: Flatten the 3-column grid back to vertical positions
                // activeStack.card_ids currently reflects the order in the UI
                const updates = activeStack.card_ids.map((id, index) => ({
                    stack_id: activeStack.id,
                    card_id: id,
                    position: index
                }));
                
                await _db.from('stack_items').delete().eq('stack_id', activeStack.id);
                await _db.from('stack_items').insert(updates);
                setPulse('online');
                alert("Triple-Column Sweep Harvested & Persisted.");
            };

            const swapSlots = (idxA, idxB) => {
                const newIds = [...activeStack.card_ids];
                [newIds[idxA], newIds[idxB]] = [newIds[idxB], newIds[idxA]];
                setActiveStack({...activeStack, card_ids: newIds});
            };

            const jumpTo = (id) => {
                if(!id) return;
                setFocusCardId(id);
            };

            // Recursive Discovery: Harvest media from linked cards in current focus notes
            const harvestedMedia = useMemo(() => {
                if (!focusCardId || !masterLibrary[focusCardId]) return [];
                const notes = masterLibrary[focusCardId].notes || "";
                const matches = [...notes.matchAll(/\[\[Card:([^\]|]+)/g)];
                const mediaItems = [...(masterLibrary[focusCardId].media || [])];
                
                matches.forEach(m => {
                    const ref = m[1];
                    const target = masterLibrary[ref] || Object.values(masterLibrary).find(c => c.header === ref);
                    if (target && target.media) mediaItems.push(...target.media);
                });
                return mediaItems;
            }, [focusCardId, masterLibrary]);

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-white">
                    <button onClick={() => _db.auth.signInWithOAuth({ provider: 'google' })} className="px-10 py-5 bg-indigo-600 rounded-3xl font-black uppercase text-xs tracking-widest hover:scale-105 transition-all">Authenticate Studio</button>
                </div>
            );

            return (
                <div className="p-8 md:p-20">
                    {/* STUDIO PULSE HUD */}
                    <div className="fixed bottom-10 right-10 z-[9999] flex items-center gap-4 glass p-4 rounded-3xl border-2 border-white shadow-2xl">
                        <div className="text-right">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Studio Heartbeat</p>
                            <p className="text-xs font-bold text-slate-800">{pulse === 'online' ? 'LINKED' : 'SYNCING'}</p>
                        </div>
                        <div className={`w-4 h-4 rounded-full ${pulse === 'online' ? 'bg-emerald-500 pulse-ring' : 'bg-indigo-500 animate-ping'}`}></div>
                    </div>

                    {view === 'vault' && (
                        <div className="max-w-7xl mx-auto">
                            <header className="flex justify-between items-end mb-20">
                                <div>
                                    <h1 className="text-8xl font-black italic tracking-tighter text-indigo-600 leading-none">THE VAULT</h1>
                                    <p className="mt-4 text-slate-400 font-bold uppercase text-[11px] tracking-[0.3em]">Atomic Knowledge Graph v14.9</p>
                                </div>
                                <button onClick={() => alert("Create Stack Logic")} className="bg-slate-900 text-white px-12 py-5 rounded-full font-black text-xs uppercase">+ Create Stack</button>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                {stacks.map(s => (
                                    <div key={s.id} onClick={async () => {
                                        setPulse('syncing');
                                        const { data: items } = await _db.from('stack_items').select('card_id').eq('stack_id', s.id).order('position');
                                        setActiveStack({ ...s, card_ids: items.map(i => i.card_id).filter(id => masterLibrary[id]) });
                                        setView('studio');
                                        setPulse('online');
                                    }} className="bg-white p-16 rounded-[4rem] border border-slate-100 hover:border-indigo-500 cursor-pointer transition-all hover:-translate-y-2 card-slot shadow-sm group">
                                        <div className="w-14 h-14 bg-indigo-50 rounded-2xl mb-6 flex items-center justify-center font-black text-indigo-600 italic">S</div>
                                        <h2 className="text-3xl font-black uppercase tracking-tighter text-slate-800 mb-2">{s.name}</h2>
                                        <p className="text-slate-400 font-bold text-[10px] uppercase">Relational Persistence</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'studio' && (
                        <div className="animate-in fade-in duration-500">
                            <nav className="flex justify-between items-center mb-16 glass p-8 rounded-[3rem] sticky top-10 z-[500]">
                                <div className="flex gap-10 items-center">
                                    <button onClick={() => setView('vault')} className="text-xs font-black uppercase text-slate-400 hover:text-indigo-600 transition-colors">← Exit Studio</button>
                                    <h2 className="text-3xl font-black italic tracking-tighter uppercase text-slate-900">{activeStack.name}</h2>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={handleHarvest} className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl hover:bg-indigo-700">Harvest Sweep</button>
                                </div>
                            </nav>

                            {/* TRIPLE-COLUMN SWEEP ENGINE */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {['Slot A (Priority)', 'Slot B (Review)', 'Slot C (Mastered)'].map((label, colIdx) => (
                                    <div key={colIdx} className="space-y-6">
                                        <div className="px-8 flex justify-between items-center">
                                            <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">{label}</span>
                                        </div>
                                        {activeStack.card_ids.filter((_, i) => i % 3 === colIdx).map((id, i) => (
                                            <div key={id} className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm relative group hover:border-indigo-200">
                                                <div className="flex justify-between mb-4">
                                                    <span className="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Node {id.slice(0,4)}</span>
                                                    <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                        <button onClick={() => swapSlots(activeStack.card_ids.indexOf(id), activeStack.card_ids.indexOf(id)-1)} className="text-lg">←</button>
                                                        <button onClick={() => swapSlots(activeStack.card_ids.indexOf(id), activeStack.card_ids.indexOf(id)+1)} className="text-lg">→</button>
                                                    </div>
                                                </div>
                                                <h3 onClick={() => jumpTo(id)} className="text-xl font-black uppercase tracking-tight mb-4 cursor-pointer hover:text-indigo-600">{masterLibrary[id].header}</h3>
                                                <NoteRenderer text={masterLibrary[id].notes?.slice(0, 100) + '...'} library={masterLibrary} onJump={jumpTo} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* FOCUS STUDIO MODAL */}
                    {focusCardId && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-900/40 backdrop-blur-md p-4">
                            <div className="studio-modal bg-white flex flex-col md:flex-row shadow-2xl animate-in zoom-in-95 duration-300">
                                {/* Left Content: Note Editor */}
                                <div className="flex-1 p-12 md:p-20 overflow-y-auto no-scrollbar">
                                    <button onClick={() => setFocusCardId(null)} className="mb-10 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-rose-500">Close Focus Mode</button>
                                    <input 
                                        className="w-full text-6xl font-black italic tracking-tighter uppercase mb-10 outline-none text-slate-900 placeholder-slate-200"
                                        value={masterLibrary[focusCardId].header}
                                        onChange={(e) => {
                                            const newLib = {...masterLibrary};
                                            newLib[focusCardId].header = e.target.value;
                                            setMasterLibrary(newLib);
                                            setPulse('syncing');
                                            _db.from('cards').update({ header: e.target.value }).eq('id', focusCardId).then(() => setPulse('online'));
                                        }}
                                    />
                                    <textarea 
                                        className="w-full h-full min-h-[400px] text-lg leading-relaxed text-slate-600 outline-none resize-none placeholder-slate-200"
                                        value={masterLibrary[focusCardId].notes}
                                        placeholder="Begin atomic capture..."
                                        onChange={(e) => {
                                            const newLib = {...masterLibrary};
                                            newLib[focusCardId].notes = e.target.value;
                                            setMasterLibrary(newLib);
                                            setPulse('syncing');
                                            _db.from('cards').update({ notes: e.target.value }).eq('id', focusCardId).then(() => setPulse('online'));
                                        }}
                                    />
                                </div>
                                
                                {/* Right Content: Discovery Sidebar */}
                                <div className="w-full md:w-[450px] bg-slate-50 border-l border-slate-100 p-12 overflow-y-auto flex flex-col gap-10">
                                    <div>
                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Recursive Media Harvest</h4>
                                        <MediaGallery media={harvestedMedia} />
                                    </div>
                                    
                                    <div className="flex-1">
                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Quick-Linker Palette</h4>
                                        <input 
                                            type="text" 
                                            placeholder="Search Master Library..." 
                                            className="w-full p-4 rounded-2xl border border-slate-200 mb-4 text-sm"
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                        <div className="space-y-2">
                                            {Object.values(masterLibrary)
                                                .filter(c => c.header.toLowerCase().includes(searchQuery.toLowerCase()))
                                                .slice(0, 8)
                                                .map(c => (
                                                    <div 
                                                        key={c.id} 
                                                        onClick={() => {
                                                            const cursor = ` [[Card:${c.id}|${c.header}]]`;
                                                            const newLib = {...masterLibrary};
                                                            newLib[focusCardId].notes += cursor;
                                                            setMasterLibrary(newLib);
                                                        }}
                                                        className="p-4 bg-white rounded-2xl border border-slate-100 hover:border-indigo-400 cursor-pointer text-xs font-bold uppercase transition-all"
                                                    >
                                                        {c.header}
                                                    </div>
                                                ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
