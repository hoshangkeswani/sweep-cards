<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: DB Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .loading-spin { animation: spin 1s linear infinite; border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .wiki-link { cursor: pointer; color: #4f46e5; font-weight: 800; text-decoration: underline; background: #f5f3ff; padding: 2px 8px; border-radius: 8px; border: 1px solid #ddd6fe; font-size: 0.85em; transition: all 0.2s; display: inline-block; }
        .wiki-link:hover { background: #4f46e5; color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;

        // !!! INSERT YOUR SUPABASE CREDENTIALS HERE !!!
        const SUPABASE_URL = 'https://jslelyvziimqimmaxvlk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGVseXZ6aWltcWltbWF4dmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNTksImV4cCI6MjA5MzM2MTM1OX0.DdDfRZcgfNu7fFZi0uHMSBi-TUNvYVEuHMwiPHdJIa4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MediaViewer = ({ item, className, autoPlay = true }) => {
            if (!item) return null;
            if (item.type === 'video') return <video src={item.url} className={className} loop muted autoPlay={autoPlay} playsInline />;
            return <img src={item.url} className={className} loading="lazy" />;
        };

        const NoteRenderer = memo(({ text, onJump, library }) => {
            if (!text) return <p className="text-slate-300 italic text-xs">No notes...</p>;
            const parts = text.split(/(\[\[Card:[^\]]+\]\])/g);
            return (
                <div className="whitespace-pre-wrap leading-relaxed text-slate-600 text-sm">
                    {parts.map((part, i) => {
                        const match = part.match(/\[\[Card:([^\]|]+)(?:\|([^\]]+))?\]\]/);
                        if (match) {
                            const rawIdOrName = match[1];
                            const pipedLabel = match[2];
                            const card = Object.values(library).find(c => c.id === rawIdOrName || c.header === rawIdOrName);
                            return (
                                <span key={i} className="wiki-link" onClick={(e) => { e.stopPropagation(); onJump(card?.id); }}>
                                    📄 {pipedLabel || card?.header || "Unknown"}
                                </span>
                            );
                        }
                        return part;
                    })}
                </div>
            );
        });

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState('saved');
            const [view, setView] = useState('library'); // library, edit, review
            
            const [masterLibrary, setMasterLibrary] = useState({});
            const [stacks, setStacks] = useState([]);
            const [activeStack, setActiveStack] = useState(null);
            const [focusedCardId, setFocusedCardId] = useState(null);
            
            const [reviewRows, setReviewRows] = useState([]);
            const [currentRow, setCurrentRow] = useState(0);
            const [mediaIndices, setMediaIndices] = useState({});
            const [zoomUrl, setZoomUrl] = useState(null);

            // --- AUTH & INIT ---
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    if (session?.user) bootStudio(); else setIsLoading(false);
                });
            }, []);

            const bootStudio = async () => {
                setIsLoading(true);
                const { data: cards } = await supabase.from('cards').select('*, media(*)');
                const { data: stacks } = await supabase.from('stacks').select('*');
                
                const lib = {};
                cards.forEach(c => lib[c.id] = c);
                setMasterLibrary(lib);
                setStacks(stacks);
                setIsLoading(false);
            };

            const handleLogin = async () => {
                const { data, error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
            };

            // --- DATA ACTIONS ---
            const updateCard = async (cid, updates) => {
                setSyncStatus('syncing');
                setMasterLibrary(prev => ({ ...prev, [cid]: { ...prev[cid], ...updates } }));
                const { error } = await supabase.from('cards').update(updates).eq('id', cid);
                setSyncStatus(error ? 'offline' : 'saved');
            };

            const openStack = async (stack) => {
                setIsLoading(true);
                const { data: items } = await supabase.from('stack_items').select('card_id').eq('stack_id', stack.id).order('position');
                setActiveStack({ ...stack, card_ids: items.map(i => i.card_id) });
                setView('edit');
                setIsLoading(false);
            };

            const getExtendedMedia = (cid) => {
                const card = masterLibrary[cid]; if (!card) return [];
                const own = card.media || [];
                // Simple regex for linked cards
                const links = (card.description || "").match(/\[\[Card:([^\]|]+)/g) || [];
                const linkedMedia = [];
                links.forEach(link => {
                    const id = link.replace('[[Card:', '');
                    const target = masterLibrary[id] || Object.values(masterLibrary).find(c => c.header === id);
                    if (target?.media) linkedMedia.push(...target.media.map(m => ({ ...m, source: target.header })));
                });
                return [...own, ...linkedMedia];
            };

            // --- THE SWEEP LOGIC ---
            const enterReview = () => {
                const rows = [];
                const ids = activeStack.card_ids;
                for (let i = 0; i < ids.length; i += 3) rows.push(ids.slice(i, i + 3));
                setReviewRows(rows);
                setCurrentRow(0);
                setView('review');
            };

            const completeSweep = async () => {
                setIsLoading(true);
                const colA = [], colB = [], colC = [];
                reviewRows.forEach(row => {
                    if (row[0]) colA.push(row[0]);
                    if (row[1]) colB.push(row[1]);
                    if (row[2]) colC.push(row[2]);
                });
                const newOrder = [...colA, ...colB, ...colC];
                
                // Transactional Sweep Update
                await supabase.from('stack_items').delete().eq('stack_id', activeStack.id);
                const inserts = newOrder.map((cid, idx) => ({ stack_id: activeStack.id, card_id: cid, position: idx }));
                await supabase.from('stack_items').insert(inserts);
                
                setActiveStack(p => ({...p, card_ids: newOrder}));
                setView('edit');
                setIsLoading(false);
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center"><div className="loading-spin"></div></div>;
            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-20 rounded-[4rem] text-center shadow-2xl modal-enter">
                        <div className="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-8 flex items-center justify-center text-white text-4xl font-black italic">S</div>
                        <h1 className="text-4xl font-black uppercase tracking-tighter mb-8">Studio v14</h1>
                        <button onClick={handleLogin} className="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl">Connect via Database</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 pb-40">
                    {/* STUDIO PULSE */}
                    <div className="fixed bottom-6 right-6 z-[8000]">
                        <div className="glass px-6 py-3 rounded-2xl flex items-center gap-4 shadow-xl border border-white">
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">DB Live</span>
                            <div className={`w-3 h-3 rounded-full ${syncStatus === 'saved' ? 'bg-emerald-500' : 'bg-indigo-500 animate-ping'}`}></div>
                        </div>
                    </div>

                    {zoomUrl && (
                        <div className="fixed inset-0 z-[9000] bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setZoomUrl(null)}>
                            <MediaViewer item={{url: zoomUrl, type: zoomUrl.includes('mp4') ? 'video' : 'image'}} className="max-w-full max-h-full rounded-2xl" />
                        </div>
                    )}

                    {/* VIEW: LIBRARY */}
                    {view === 'library' && (
                        <div className="space-y-10">
                            <header className="flex justify-between items-end">
                                <div>
                                    <h1 className="text-4xl font-black uppercase italic tracking-tighter text-indigo-600">The Vault</h1>
                                    <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-2">Database Persistent Ecology</p>
                                </div>
                                <button onClick={async () => {
                                    const { data } = await supabase.from('stacks').insert({ user_id: user.id, name: 'New Stack' }).select().single();
                                    setStacks([data, ...stacks]);
                                }} className="bg-indigo-600 text-white px-8 py-4 rounded-full font-black text-xs uppercase shadow-xl">+ NEW STACK</button>
                            </header>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                {stacks.map(s => (
                                    <div key={s.id} onClick={() => openStack(s)} className="bg-white p-12 rounded-[4rem] border border-slate-100 hover:border-indigo-400 cursor-pointer transition-all shadow-sm group text-center relative">
                                        <div className="w-16 h-16 bg-indigo-50 rounded-3xl mb-6 flex items-center justify-center text-indigo-600 font-black mx-auto text-xl italic">S</div>
                                        <h3 className="font-black text-slate-800 text-2xl uppercase tracking-tighter">{s.name}</h3>
                                        <button onClick={(e) => { e.stopPropagation(); supabase.from('stacks').delete().eq('id', s.id).then(bootStudio); }} className="absolute top-8 right-8 text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 font-bold">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* VIEW: EDIT */}
                    {view === 'edit' && (
                        <div className="space-y-10">
                            <nav className="flex justify-between items-center glass p-6 rounded-[3rem] shadow-lg">
                                <div className="flex gap-4 items-center">
                                    <button onClick={() => setView('library')} className="text-slate-400 font-black text-xs uppercase tracking-widest">← Library</button>
                                    <h1 className="text-2xl font-black uppercase italic tracking-tighter text-indigo-600">{activeStack.name}</h1>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={async () => {
                                        const { data: card } = await supabase.from('cards').insert({ user_id: user.id, header: 'Untitled Card' }).select().single();
                                        await supabase.from('stack_items').insert({ stack_id: activeStack.id, card_id: card.id, position: activeStack.card_ids.length });
                                        setMasterLibrary({ ...masterLibrary, [card.id]: card });
                                        setActiveStack({ ...activeStack, card_ids: [...activeStack.card_ids, card.id] });
                                    }} className="bg-slate-800 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg">Add Card</button>
                                    <button onClick={enterReview} className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Sweep</button>
                                </div>
                            </nav>
                            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6">
                                {activeStack.card_ids.map(cid => {
                                    const card = masterLibrary[cid];
                                    return (
                                        <div key={cid} onClick={() => setFocusedCardId(cid)} className="bg-white rounded-[2.5rem] p-5 shadow-sm border-2 border-transparent hover:border-indigo-400 cursor-pointer transition-all flex flex-col h-[320px]">
                                            <div className="aspect-video bg-slate-900 rounded-3xl overflow-hidden mb-4 shadow-inner">
                                                <MediaViewer item={card?.media?.[0]} className="w-full h-full object-cover opacity-80" autoPlay={false} />
                                            </div>
                                            <h4 className="font-black text-[11px] uppercase tracking-tighter mb-2">{card?.header}</h4>
                                            <p className="text-[10px] text-slate-400 line-clamp-3 leading-tight">{card?.description || "No notes..."}</p>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    {/* VIEW: REVIEW (SWEEP) */}
                    {view === 'review' && (
                        <div className="animate-in fade-in duration-500 space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                {[0, 1, 2].map(i => {
                                    const cid = reviewRows[currentRow]?.[i];
                                    const card = masterLibrary[cid];
                                    if (!card) return <div key={i} className="rounded-[4rem] bg-slate-100/50 border-dashed border-2 border-slate-200 h-[650px]"></div>;
                                    const extMedia = getExtendedMedia(cid);
                                    const midx = mediaIndices[cid] || 0;
                                    return (
                                        <div key={i} className="flex flex-col gap-4">
                                            <div className="text-center font-black text-indigo-200 text-[10px] uppercase tracking-widest italic leading-none">Slot {String.fromCharCode(65+i)}</div>
                                            <div className="rounded-[4rem] bg-white shadow-2xl p-10 h-[650px] flex flex-col relative group">
                                                <h2 className="text-2xl font-black uppercase tracking-tighter mb-6">{card.header}</h2>
                                                <div className="relative bg-black rounded-[2.5rem] overflow-hidden mb-8 aspect-video shrink-0 shadow-2xl">
                                                    <div className="w-full h-full cursor-zoom-in" onClick={() => setZoomUrl(extMedia[midx]?.url)}>
                                                        <MediaViewer item={extMedia[midx]} className="w-full h-full object-contain" />
                                                    </div>
                                                    {extMedia.length > 1 && (
                                                        <div className="absolute inset-x-4 top-1/2 -translate-y-1/2 flex justify-between opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => setMediaIndices(prev => ({...prev, [cid]: (midx - 1 + extMedia.length) % extMedia.length}))} className="glass text-indigo-600 w-12 h-12 rounded-full font-black">←</button>
                                                            <button onClick={() => setMediaIndices(prev => ({...prev, [cid]: (midx + 1) % extMedia.length}))} className="glass text-indigo-600 w-12 h-12 rounded-full font-black">→</button>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex-1 overflow-y-auto pr-2">
                                                    <NoteRenderer text={card.description} onJump={setFocusedCardId} library={masterLibrary} />
                                                    <textarea className="w-full h-40 mt-4 p-4 bg-slate-50 rounded-2xl text-xs font-medium outline-none border-none resize-none" value={card.description} onChange={(e) => updateCard(cid, {description: e.target.value})} />
                                                </div>
                                            </div>
                                            <div className="flex justify-center gap-3">
                                                <button disabled={i===0} onClick={()=> {const nr = [...reviewRows]; const r = [...nr[currentRow]]; [r[i], r[i-1]] = [r[i-1], r[i]]; nr[currentRow] = r; setReviewRows(nr);}} className="bg-white px-8 py-3 rounded-2xl shadow-sm font-black text-[10px] disabled:opacity-20 uppercase italic transition-all">← Swap</button>
                                                <button disabled={i===2 || !reviewRows[currentRow][i+1]} onClick={()=> {const nr = [...reviewRows]; const r = [...nr[currentRow]]; [r[i], r[i+1]] = [r[i+1], r[i]]; nr[currentRow] = r; setReviewRows(nr);}} className="bg-white px-8 py-3 rounded-2xl shadow-sm font-black text-[10px] disabled:opacity-20 uppercase italic transition-all">Swap →</button>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>

                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1500] w-full max-w-3xl px-6">
                                <div className="glass p-3 rounded-full shadow-2xl flex items-center justify-between border-2 border-indigo-100">
                                    <button onClick={() => setView('edit')} className="px-8 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-rose-500">Exit</button>
                                    <div className="flex items-center gap-3">
                                        <button disabled={currentRow === 0} onClick={() => setCurrentRow(currentRow - 1)} className="bg-slate-100 text-slate-800 px-8 py-4 rounded-full font-black text-[11px] uppercase tracking-widest">Prev</button>
                                        <span className="text-[12px] font-black text-indigo-400 px-6 italic uppercase">{currentRow + 1} / {reviewRows.length}</span>
                                        {currentRow < reviewRows.length - 1 ? 
                                            <button onClick={() => setCurrentRow(currentRow + 1)} className="bg-indigo-600 text-white px-12 py-4 rounded-full font-black text-xs uppercase tracking-widest shadow-xl">Next Set</button> :
                                            <button onClick={completeSweep} className="bg-emerald-600 text-white px-12 py-4 rounded-full font-black text-xs uppercase italic tracking-widest shadow-xl">Complete Sweep</button>
                                        }
                                    </div>
                                    <div className="w-20"></div> {/* Spacer for balance */}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* GLOBAL MODAL: FOCUS EDITOR */}
                    {focusedCardId && masterLibrary[focusedCardId] && (
                        <div className="fixed inset-0 z-[10000] bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-10">
                            <div className="bg-white w-full max-w-6xl h-[85vh] rounded-[4rem] shadow-2xl flex flex-col overflow-hidden modal-enter relative">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Studio Focus Mode</span>
                                    <button onClick={() => setFocusedCardId(null)} className="text-slate-300 hover:text-rose-500 font-black text-4xl transition-colors">×</button>
                                </div>
                                <div className="flex-1 flex overflow-hidden p-12 gap-12">
                                    <div className="w-1/3 flex flex-col gap-6">
                                        <div className="aspect-square bg-slate-900 rounded-[3rem] overflow-hidden shadow-2xl relative group">
                                            <MediaViewer item={getExtendedMedia(focusedCardId)[0]} className="w-full h-full object-contain" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {masterLibrary[focusedCardId].media?.map((m, idx) => (
                                                <div key={m.id} className="aspect-video bg-black rounded-2xl overflow-hidden shadow-lg border border-slate-100">
                                                    <MediaViewer item={m} className="w-full h-full object-cover" autoPlay={false} />
                                                </div>
                                            ))}
                                            <label className="aspect-video border-2 border-dashed border-slate-300 rounded-2xl flex flex-col items-center justify-center text-[10px] font-black uppercase text-slate-400 cursor-pointer hover:border-indigo-400 transition-all">
                                                + Media
                                                <input type="file" hidden accept="image/*,video/*" onChange={async (e) => {
                                                    const file = e.target.files[0]; if(!file) return;
                                                    const fileName = `${Date.now()}-${file.name}`;
                                                    const { data } = await supabase.storage.from('media').upload(fileName, file);
                                                    if(data) {
                                                        const { data: { publicUrl } } = supabase.storage.from('media').getPublicUrl(fileName);
                                                        const { data: m } = await supabase.from('media').insert({ card_id: focusedCardId, url: publicUrl, type: file.type.startsWith('video') ? 'video' : 'image' }).select().single();
                                                        setMasterLibrary(prev => ({
                                                            ...prev,
                                                            [focusedCardId]: { ...prev[focusedCardId], media: [...(prev[focusedCardId].media || []), m] }
                                                        }));
                                                    }
                                                }} />
                                            </label>
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col gap-6">
                                        <input className="text-4xl font-black outline-none border-b-4 border-slate-50 focus:border-indigo-500 pb-4 transition-colors" value={masterLibrary[focusedCardId].header} onChange={(e) => updateCard(focusedCardId, {header: e.target.value})} />
                                        <textarea className="flex-1 text-slate-600 text-lg outline-none resize-none leading-relaxed font-medium" placeholder="Studio notes..." value={masterLibrary[focusedCardId].description} onChange={(e) => updateCard(focusedCardId, {description: e.target.value})} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
