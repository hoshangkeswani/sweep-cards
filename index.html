<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; border-top-color: #4f46e5; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .lightbox-fade { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // !!! RE-PASTE YOUR REAL KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCpRGr-L5zFJDksK6yT2KHxIlRgm6Daaz0';

        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]); 
            const [masterLibrary, setMasterLibrary] = useState({}); 
            const [activeStack, setActiveStack] = useState(null); // { id, name, cardIds, notes }
            
            const [token, setToken] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [showBorrowModal, setShowBorrowModal] = useState(false);
            const [zoomUrl, setZoomUrl] = useState(null); // Lightbox state
            
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);
            const fileInputRef = useRef(null);
            const saveTimeoutRef = useRef(null);
            const stackSaveTimeoutRef = useRef(null);

            useEffect(() => {
                gapi.load('client', async () => {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                });
            }, []);

            const login = () => {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => {
                        setToken(res.access_token);
                        initialSystemBoot(res.access_token);
                    },
                });
                client.requestAccessToken();
            };

            const initialSystemBoot = async (accessToken) => {
                setIsLoading(true);
                await fetchMasterLibrary(accessToken);
                await refreshLibrary(accessToken);
                setIsLoading(false);
            };

            const fetchMasterLibrary = async (accessToken) => {
                try {
                    const list = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                    if (list.result.files[0]) {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${list.result.files[0].id}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        setMasterLibrary(await res.json());
                    }
                } catch (e) { console.error("Library load failed", e); }
            };

            const refreshLibrary = async (accessToken) => {
                try {
                    const list = await gapi.client.drive.files.list({ 
                        q: "mimeType = 'application/json' and name contains 'sweep_stack_'",
                        fields: "files(id, name)"
                    });
                    
                    const files = list.result.files || [];
                    const stacksWithCounts = await Promise.all(files.map(async (file) => {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        const data = await res.json();
                        // Support both old array format and new object format
                        const count = Array.isArray(data) ? data.length : (data.cardIds ? data.cardIds.length : 0);
                        return { ...file, count };
                    }));
                    
                    setStacks(stacksWithCounts);
                } catch (e) { console.error("Library sync failed", e); }
            };

            const saveMasterLibrary = async (newLib) => {
                setSyncStatus('syncing');
                const masterList = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                const masterId = masterList.result.files[0]?.id;
                const blob = new Blob([JSON.stringify(newLib)], { type: 'application/json' });
                if (masterId) {
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${masterId}?uploadType=media`, {
                        method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                    });
                } else {
                    const meta = { name: 'sweep_master_library.json', mimeType: 'application/json' };
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                    form.append('file', blob);
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                    });
                }
                setSyncStatus('saved');
            };

            const saveStackContent = async (stackId, cardIds, notes) => {
                setSyncStatus('syncing');
                const payload = { cardIds, notes };
                const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
                const response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${stackId}?uploadType=media`, {
                    method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                });
                setSyncStatus('saved');
                return response.ok;
            };

            const openStack = async (stackFile) => {
                setIsLoading(true);
                try {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${stackFile.id}?alt=media`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const data = await res.json();
                    // Handle transition from array-only storage to object-based storage
                    const ids = Array.isArray(data) ? data : (data.cardIds || []);
                    const notes = data.notes || "";
                    setActiveStack({ ...stackFile, cardIds: ids, notes: notes });
                    setView('edit');
                } catch (e) { console.error(e); }
                setIsLoading(false);
            };

            const createStack = async () => {
                const name = prompt("New Stack Name:");
                if (!name) return;
                setIsLoading(true);
                const metadata = { name: `sweep_stack_${name}.json`, mimeType: 'application/json' };
                const blob = new Blob([JSON.stringify({ cardIds: [], notes: "" })], { type: 'application/json' });
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', blob);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                });
                await refreshLibrary(token);
                setIsLoading(false);
            };

            const deleteStack = async (id, e) => {
                e.stopPropagation();
                if(!confirm("Delete collection?")) return;
                setIsLoading(true);
                await gapi.client.drive.files.delete({ fileId: id });
                await refreshLibrary(token);
                setIsLoading(false);
            };

            const updateCardData = (cardId, updates) => {
                const newLib = { ...masterLibrary, [cardId]: { ...masterLibrary[cardId], ...updates } };
                setMasterLibrary(newLib);
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                saveTimeoutRef.current = setTimeout(() => saveMasterLibrary(newLib), 2000);
            };

            const handleStackNotesChange = (newNotes) => {
                const updatedStack = { ...activeStack, notes: newNotes };
                setActiveStack(updatedStack);
                if (stackSaveTimeoutRef.current) clearTimeout(stackSaveTimeoutRef.current);
                stackSaveTimeoutRef.current = setTimeout(() => {
                    saveStackContent(activeStack.id, updatedStack.cardIds, newNotes);
                }, 2000);
            };

            const addNewCard = () => {
                const id = "c_" + Date.now() + Math.random().toString(36).substr(2, 5);
                const newLib = { ...masterLibrary, [id]: { id, header: '', description: '', image: null } };
                const newIds = [...activeStack.cardIds, id];
                setMasterLibrary(newLib);
                setActiveStack({...activeStack, cardIds: newIds});
                saveMasterLibrary(newLib);
                saveStackContent(activeStack.id, newIds, activeStack.notes);
            };

            const borrowCard = (id) => {
                if (activeStack.cardIds.includes(id)) return;
                const newIds = [...activeStack.cardIds, id];
                setActiveStack({ ...activeStack, cardIds: newIds });
                saveStackContent(activeStack.id, newIds, activeStack.notes);
            };

            const removeCardFromStack = (id) => {
                const newIds = activeStack.cardIds.filter(cid => cid !== id);
                setActiveStack({ ...activeStack, cardIds: newIds });
                saveStackContent(activeStack.id, newIds, activeStack.notes);
            };

            const bulkUpload = (e) => {
                const files = Array.from(e.target.files);
                setIsLoading(true);
                let processed = 0;
                let tempLib = { ...masterLibrary };
                let tempIds = [ ...activeStack.cardIds ];
                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const id = "c_" + Math.random().toString(36).substr(2, 9);
                        tempLib[id] = { id, header: file.name.split('.')[0], description: '', image: ev.target.result };
                        tempIds.push(id);
                        processed++;
                        if (processed === files.length) {
                            setMasterLibrary(tempLib);
                            setActiveStack({ ...activeStack, cardIds: tempIds });
                            saveMasterLibrary(tempLib);
                            saveStackContent(activeStack.id, tempIds, activeStack.notes);
                            setIsLoading(false);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            };

            const startReview = () => {
                const rs = [];
                for (let i = 0; i < activeStack.cardIds.length; i += 3) rs.push(activeStack.cardIds.slice(i, i + 3));
                setReviewRows(rs);
                setCurrentRow(0);
                setView('review');
                window.scrollTo(0, 0);
            };

            const swap = (rowIdx, a, b) => {
                const newRows = [...reviewRows];
                const row = [...newRows[rowIdx]];
                [row[a], row[b]] = [row[b], row[a]];
                newRows[rowIdx] = row;
                setReviewRows(newRows);
            };

            const completeSweep = async () => {
                setSyncStatus('syncing');
                const a=[], b=[], c=[];
                reviewRows.forEach(row => { if(row[0]) a.push(row[0]); if(row[1]) b.push(row[1]); if(row[2]) c.push(row[2]); });
                const newIds = [...a, ...b, ...c];
                
                const success = await saveStackContent(activeStack.id, newIds, activeStack.notes);
                if (success) {
                    setActiveStack({ ...activeStack, cardIds: newIds });
                    setView('edit');
                } else {
                    alert("Sync Error: Could not save order.");
                }
            };

            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-center p-6">
                    <div className="bg-white p-16 md:p-24 rounded-[4rem] shadow-2xl max-w-xl">
                        <h1 className="text-6xl font-black text-indigo-600 mb-4 italic tracking-tighter uppercase">Sweep Pro</h1>
                        <p className="text-slate-400 mb-12 font-medium">Cloud Studio v4.0</p>
                        <button onClick={login} className="w-full bg-indigo-600 text-white px-12 py-6 rounded-[2.5rem] font-black text-xl shadow-xl hover:bg-indigo-700 transition-all">CONNECT GOOGLE DRIVE</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-400">
                    <div className="w-16 h-16 border-8 border-slate-200 rounded-full loading-spin mb-6"></div>
                    <p className="font-black text-xs uppercase tracking-widest animate-pulse">Syncing Cloud...</p>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-10">
                    {/* LIGHTBOX OVERLAY */}
                    {zoomUrl && (
                        <div className="fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center p-4 cursor-zoom-out lightbox-fade" onClick={() => setZoomUrl(null)}>
                            <img src={zoomUrl} className="max-w-full max-h-full object-contain shadow-2xl" />
                            <button className="absolute top-10 right-10 text-white font-black text-4xl w-16 h-16 rounded-full bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center">×</button>
                        </div>
                    )}

                    <nav className="flex justify-between items-center mb-8 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                        <div className="flex items-center gap-6">
                            {view !== 'library' && <button onClick={() => setView('library')} className="bg-slate-50 p-4 rounded-2xl hover:bg-slate-200 font-black">← LIBRARY</button>}
                            <div>
                                <h1 className="text-2xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">{view === 'library' ? 'Collections' : activeStack.name.replace('sweep_stack_', '').replace('.json', '')}</h1>
                                <span className={`text-[10px] font-black uppercase tracking-widest mt-1 block ${syncStatus === 'syncing' ? 'text-amber-500 animate-ping' : 'text-slate-300'}`}>
                                    {syncStatus === 'syncing' ? 'Syncing...' : 'Cloud Locked'}
                                </span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {view === 'library' ? (
                                <button onClick={createStack} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-xs tracking-widest shadow-lg">+ NEW</button>
                            ) : view === 'edit' ? (
                                <>
                                    <button onClick={() => setShowBorrowModal(true)} className="bg-emerald-500 text-white px-6 py-4 rounded-2xl font-black text-xs">BORROW</button>
                                    <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase">Bulk</button>
                                    <button onClick={startReview} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Start Review</button>
                                    <input type="file" multiple hidden ref={fileInputRef} onChange={bulkUpload} />
                                </>
                            ) : <div className="text-xs font-black text-indigo-600 bg-indigo-50 px-6 py-4 rounded-2xl uppercase tracking-widest">Review Protocol</div>}
                        </div>
                    </nav>

                    {/* LIBRARY VIEW */}
                    {view === 'library' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            {stacks.map(s => (
                                <div key={s.id} onClick={() => openStack(s)} className="bg-white p-12 rounded-[4rem] border border-slate-100 hover:border-indigo-400 transition-all cursor-pointer group shadow-sm hover:shadow-2xl relative">
                                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl mb-8 group-hover:bg-indigo-600 transition-colors flex items-center justify-center text-indigo-600 group-hover:text-white font-black text-3xl italic shadow-inner">S</div>
                                    <h3 className="font-black text-slate-800 uppercase tracking-tighter text-2xl mb-2">{s.name.replace('sweep_stack_', '').replace('.json', '')}</h3>
                                    <p className="text-xs font-black text-slate-300 uppercase tracking-widest">{s.count} CARDS</p>
                                    <button onClick={(e) => deleteStack(s.id, e)} className="absolute top-10 right-10 text-slate-200 hover:text-rose-500 font-bold">×</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* EDIT VIEW */}
                    {view === 'edit' && activeStack && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {activeStack.cardIds.map(cid => {
                                const card = masterLibrary[cid];
                                if(!card) return null;
                                return (
                                    <div key={cid} className="bg-white rounded-[2.5rem] border border-slate-100 h-[520px] flex flex-col overflow-hidden shadow-sm">
                                        <div className="p-6 flex-1 overflow-y-auto space-y-4">
                                            <input className="w-full font-black text-lg outline-none bg-transparent" placeholder="Untitled" value={card.header} onChange={e => updateCardData(cid, {header: e.target.value})} />
                                            <label className="bg-slate-900 rounded-3xl aspect-[4/3] flex items-center justify-center overflow-hidden cursor-pointer hover:bg-slate-800">
                                                {card.image ? <img src={card.image} loading="lazy" className="w-full h-full object-contain opacity-80" /> : <span className="text-white font-black text-[10px] opacity-40 uppercase">Add Image</span>}
                                                <input type="file" hidden accept="image/*" onChange={(e) => {
                                                    const f = e.target.files[0];
                                                    const r = new FileReader();
                                                    r.onload = (ev) => updateCardData(cid, {image: ev.target.result});
                                                    r.readAsDataURL(f);
                                                }} />
                                            </label>
                                            <textarea className="w-full h-28 text-slate-500 text-sm outline-none resize-none bg-slate-50 p-5 rounded-2xl" placeholder="Description..." value={card.description} onChange={e => updateCardData(cid, {description: e.target.value})} />
                                        </div>
                                        <div className="px-6 py-4 bg-slate-50 border-t flex justify-end">
                                            <button onClick={() => removeCardFromStack(cid)} className="text-slate-300 font-black text-[10px] hover:text-rose-500">REMOVE</button>
                                        </div>
                                    </div>
                                )
                            })}
                            <button onClick={addNewCard} className="border-4 border-dashed border-slate-200 rounded-[3rem] h-[520px] text-slate-200 text-6xl hover:text-indigo-400 bg-white/40 transition-all">+</button>
                        </div>
                    )}

                    {/* REVIEW VIEW */}
                    {view === 'review' && (
                        <div className="pb-40 animate-in fade-in duration-700">
                            
                            {/* COLLECTION NOTEPAD */}
                            <div className="max-w-6xl mx-auto mb-10 bg-white p-8 rounded-[3rem] shadow-xl border-4 border-indigo-50">
                                <h2 className="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-300 mb-4 italic">Collection Master Notepad</h2>
                                <textarea 
                                    className="w-full h-32 bg-slate-50 p-6 rounded-2xl text-slate-600 font-medium outline-none focus:ring-2 ring-indigo-100 border-none transition-all resize-none"
                                    placeholder="Type collection-level notes here... they sync globally for this stack."
                                    value={activeStack.notes}
                                    onChange={(e) => handleStackNotesChange(e.target.value)}
                                />
                            </div>

                            {/* CARD GRID */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-7xl mx-auto">
                                {[0, 1, 2].map(i => {
                                    const cid = reviewRows[currentRow]?.[i];
                                    const card = masterLibrary[cid];
                                    return (
                                        <div key={i} className="flex flex-col gap-6">
                                            <div className="text-center font-black text-indigo-200 text-[10px] tracking-[0.5em] uppercase italic underline decoration-indigo-100 underline-offset-8">POSITION {String.fromCharCode(65+i)}</div>
                                            <div className={`flex-1 rounded-[4rem] border-4 min-h-[580px] p-10 transition-all ${card ? 'bg-white shadow-2xl border-white hover:border-indigo-50' : 'bg-slate-200/40 border-dashed border-slate-200 flex items-center justify-center'}`}>
                                                {card ? (
                                                    <div className="h-full flex flex-col">
                                                        <input className="w-full text-3xl font-black mb-8 outline-none bg-transparent" value={card.header} onChange={e => updateCardData(cid, {header: e.target.value})} />
                                                        {card.image && (
                                                            <div 
                                                                className="bg-black rounded-[2.5rem] overflow-hidden mb-8 aspect-video flex items-center justify-center shadow-2xl cursor-zoom-in group relative"
                                                                onClick={() => setZoomUrl(card.image)}
                                                            >
                                                                <img src={card.image} className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500" />
                                                                <div className="absolute inset-0 bg-indigo-600/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                                    <span className="text-white font-black text-[9px] bg-indigo-600 px-4 py-2 rounded-full uppercase tracking-widest shadow-xl">Click to Zoom</span>
                                                                </div>
                                                            </div>
                                                        )}
                                                        <textarea className="flex-1 w-full text-slate-500 text-lg leading-relaxed outline-none bg-transparent resize-none font-medium" value={card.description} onChange={e => updateCardData(cid, {description: e.target.value})} />
                                                    </div>
                                                ) : <span className="text-slate-300 italic font-black uppercase text-xs opacity-40">Empty Slot</span>}
                                            </div>
                                            {card && (
                                                <div className="flex justify-center gap-4">
                                                    <button disabled={i===0} onClick={()=>swap(currentRow, i, i-1)} className="bg-white px-10 py-5 rounded-3xl shadow-lg font-black text-xs disabled:opacity-20 active:scale-90 transition-all border border-slate-100 hover:border-indigo-400 uppercase">← SWAP</button>
                                                    <button disabled={i===2 || !reviewRows[currentRow][i+1]} onClick={()=>swap(currentRow, i, i+1)} className="bg-white px-10 py-5 rounded-3xl shadow-lg font-black text-xs disabled:opacity-20 active:scale-90 transition-all border border-slate-100 hover:border-indigo-400 uppercase">SWAP →</button>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>

                            {/* STICKY CONTROL BAR */}
                            <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-slate-200 p-8 flex flex-col items-center gap-4 z-[500] shadow-[0_-20px_50px_rgba(0,0,0,0.05)]">
                                <div className="bg-indigo-600 text-white px-10 py-3 rounded-full font-black text-sm uppercase tracking-[0.3em] shadow-2xl shadow-indigo-100 animate-in slide-in-from-bottom-2">
                                    Set {currentRow + 1} / {reviewRows.length}
                                </div>
                                <div className="flex gap-6 w-full max-w-3xl">
                                    {currentRow < reviewRows.length - 1 ? 
                                        <button onClick={()=>{setCurrentRow(currentRow+1); window.scrollTo(0,0);}} className="flex-1 bg-indigo-600 text-white py-8 rounded-[3rem] font-black text-2xl shadow-2xl uppercase tracking-widest hover:bg-indigo-700 hover:-translate-y-1 transition-all">Next Set</button> :
                                        <button onClick={completeSweep} className="flex-1 bg-emerald-600 text-white py-8 rounded-[3rem] font-black text-2xl shadow-2xl uppercase tracking-widest hover:bg-emerald-700 hover:-translate-y-1 transition-all italic font-serif">Sweep & Save Cloud Order</button>
                                    }
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BORROW MODAL */}
                    {showBorrowModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl flex items-center justify-center p-6 z-[1000] animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-6xl max-h-[85vh] rounded-[5rem] overflow-hidden flex flex-col p-16 shadow-2xl">
                                <div className="flex justify-between items-center mb-12">
                                    <h2 className="text-4xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">Cloud Master Library</h2>
                                    <button onClick={() => setShowBorrowModal(false)} className="bg-slate-100 p-8 rounded-full text-slate-400 font-black text-2xl hover:text-rose-500 transition-colors">×</button>
                                </div>
                                <div className="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10 pr-4">
                                    {Object.values(masterLibrary).map(card => (
                                        <div key={card.id} className="bg-slate-50 border p-8 rounded-[3.5rem] flex flex-col gap-5 shadow-sm group hover:border-indigo-300 transition-all">
                                            <h4 className="font-black text-slate-800 text-base truncate uppercase tracking-tighter leading-none">{card.header || "Untitled"}</h4>
                                            <div className="bg-slate-200 aspect-video rounded-3xl overflow-hidden shadow-inner flex items-center justify-center italic text-[10px] text-slate-400">
                                                {card.image && <img src={card.image} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />}
                                            </div>
                                            <button 
                                                disabled={activeStack.cardIds.includes(card.id)} 
                                                onClick={() => borrowCard(card.id)} 
                                                className={`w-full py-5 rounded-2xl font-black text-[10px] tracking-[0.2em] transition-all uppercase ${activeStack.cardIds.includes(card.id) ? 'bg-slate-100 text-slate-300' : 'bg-indigo-600 text-white shadow-xl hover:scale-105 active:scale-95'}`}
                                            >
                                                {activeStack.cardIds.includes(card.id) ? 'ALREADY IN STACK' : 'ADD TO STACK'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
