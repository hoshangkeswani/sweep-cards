<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: Master Studio v14.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; }
        .loading-spin { animation: spin 1s linear infinite; border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .pulse-active { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-ring { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.2); } }
        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;

        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://jslelyvziimqimmaxvlk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbGVseXZ6aWltcWltbWF4dmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODUzNTksImV4cCI6MjA5MzM2MTM1OX0.DdDfRZcgfNu7fFZi0uHMSBi-TUNvYVEuHMwiPHdJIa4'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [pulseStatus, setPulseStatus] = useState('online'); // online, syncing, error
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]);
            const [masterLibrary, setMasterLibrary] = useState({});
            const [activeStack, setActiveStack] = useState(null);
            const [focusedCardId, setFocusedCardId] = useState(null);

            // --- AUTH ---
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); bootStudio(); }
                    else { setIsLoading(false); }
                });
            }, []);

            const handleLogin = async () => {
                // REQUIREMENT 1A: Force Google Credential Prompt
                await supabase.auth.signInWithOAuth({ 
                    provider: 'google',
                    options: { 
                        redirectTo: window.location.href,
                        queryParams: { prompt: 'select_account', access_type: 'offline' } 
                    }
                });
            };

            const handleLogout = async () => {
                await supabase.auth.signOut();
                window.location.reload();
            };

            const bootStudio = async () => {
                setIsLoading(true);
                try {
                    const { data: cards, error: cErr } = await supabase.from('cards').select('*, media(*)');
                    const { data: stacksData, error: sErr } = await supabase.from('stacks').select('*').order('created_at', { ascending: false });
                    
                    if (cErr || sErr) throw (cErr || sErr);

                    const lib = {};
                    cards?.forEach(c => lib[c.id] = { ...c, media: c.media || [] });
                    setMasterLibrary(lib);
                    setStacks(stacksData || []);
                } catch (err) {
                    setPulseStatus('error');
                    console.error("Boot Failed:", err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- REQUIREMENT 1B: Fixed Button Actions ---
            const createStack = async () => {
                setPulseStatus('syncing');
                const { data, error } = await supabase.from('stacks')
                    .insert({ user_id: user.id, name: 'New Knowledge Stack' })
                    .select().single();
                
                if (error) {
                    setPulseStatus('error');
                    alert(`DB Error: ${error.message}. Ensure RLS Policies are enabled!`);
                } else {
                    setStacks([data, ...stacks]);
                    setPulseStatus('online');
                }
            };

            const openStack = async (stack) => {
                setIsLoading(true);
                const { data: items, error } = await supabase.from('stack_items')
                    .select('card_id').eq('stack_id', stack.id).order('position');
                
                if (error) {
                    setPulseStatus('error');
                } else {
                    setActiveStack({ ...stack, card_ids: items.map(i => i.card_id) });
                    setView('edit');
                }
                setIsLoading(false);
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center"><div className="loading-spin"></div></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <div className="bg-white p-20 rounded-[4rem] text-center shadow-2xl modal-enter">
                        <div className="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-8 flex items-center justify-center text-white text-4xl font-black italic">S</div>
                        <h1 className="text-4xl font-black uppercase tracking-tighter mb-8 text-slate-800">Master Studio v14.2</h1>
                        <button onClick={handleLogin} className="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Sign in with Google</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-12 pb-40">
                    
                    {/* REQUIREMENT 1C: Dynamic Pulse HUD */}
                    <div className="fixed bottom-10 right-10 z-[8000]">
                        <div className={`glass px-6 py-4 rounded-3xl flex items-center gap-5 shadow-2xl border-2 transition-all duration-500 ${pulseStatus === 'error' ? 'border-rose-200' : 'border-white'}`}>
                            <div className="text-right leading-none">
                                <p className={`text-[9px] font-black uppercase tracking-widest mb-1 ${pulseStatus === 'error' ? 'text-rose-500' : 'text-indigo-400'}`}>
                                    {pulseStatus === 'online' ? 'Database Live' : pulseStatus === 'syncing' ? 'Writing...' : 'System Blocked'}
                                </p>
                                <p className="text-[11px] font-bold text-slate-400">{user.email.split('@')[0]}</p>
                            </div>
                            <div className={`w-4 h-4 rounded-full transition-colors duration-500 ${pulseStatus === 'online' ? 'bg-emerald-500' : pulseStatus === 'syncing' ? 'bg-indigo-500 pulse-active' : 'bg-rose-500'}`}></div>
                        </div>
                    </div>

                    {view === 'library' && (
                        <div className="space-y-16">
                            <header className="flex justify-between items-end">
                                <div>
                                    <h1 className="text-6xl font-black uppercase italic tracking-tighter text-indigo-600 leading-none">The Vault</h1>
                                    <p className="text-slate-400 font-bold uppercase text-[11px] tracking-widest mt-4">Active Knowledge Ecology</p>
                                </div>
                                <div className="flex items-center gap-8">
                                    <button onClick={handleLogout} className="text-slate-400 font-black text-[10px] uppercase hover:text-rose-500 transition-colors">Logout</button>
                                    <button onClick={createStack} className="bg-indigo-600 text-white px-12 py-5 rounded-full font-black text-xs uppercase shadow-2xl hover:scale-105 active:scale-95 transition-all">+ NEW STACK</button>
                                </div>
                            </header>

                            {stacks.length === 0 ? (
                                <div className="py-32 text-center bg-white rounded-[5rem] border-4 border-dashed border-slate-100">
                                    <p className="text-slate-300 font-black uppercase tracking-[0.2em] text-sm">Vault is currently empty</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                                    {stacks.map(s => (
                                        <div key={s.id} onClick={() => openStack(s)} className="bg-white p-14 rounded-[4rem] border border-slate-100 hover:border-indigo-400 cursor-pointer shadow-sm group text-center relative transition-all hover:shadow-xl">
                                            <div className="w-16 h-16 bg-indigo-50 rounded-3xl mb-6 flex items-center justify-center text-indigo-600 font-black mx-auto text-xl italic">S</div>
                                            <h3 className="font-black text-slate-800 text-2xl uppercase tracking-tighter">{s.name}</h3>
                                            <button onClick={(e) => { e.stopPropagation(); if(confirm('Delete?')) supabase.from('stacks').delete().eq('id', s.id).then(bootStudio); }} className="absolute top-10 right-10 text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 font-bold text-2xl transition-all">×</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {view === 'edit' && (
                        <div className="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                             <nav className="flex justify-between items-center glass p-10 rounded-[4rem] shadow-2xl">
                                <div className="flex gap-8 items-center">
                                    <button onClick={() => setView('library')} className="text-slate-400 font-black text-xs uppercase hover:text-indigo-600">← Back</button>
                                    <h1 className="text-3xl font-black uppercase italic tracking-tighter text-indigo-600">{activeStack.name}</h1>
                                </div>
                                <button onClick={() => setView('library')} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase">Close Stack</button>
                            </nav>
                            <p className="text-center text-slate-400 font-medium italic">Stack functionality preserved from ecology. Ready for data entry.</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
