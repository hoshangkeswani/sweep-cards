<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep Sync Pro: Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spin { animation: spin 1s linear infinite; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // !!! PASTE YOUR KEYS HERE !!!
        const CLIENT_ID = '825424908668-34msduf922vplmf8qggoobrfkljq0d09.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCpRGr-L5zFJDksK6yT2KHxIlRgm6Daaz0';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const App = () => {
            const [view, setView] = useState('library'); 
            const [stacks, setStacks] = useState([]); 
            const [masterLibrary, setMasterLibrary] = useState({}); 
            const [activeStack, setActiveStack] = useState(null); 
            const [token, setToken] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState('');
            const [syncStatus, setSyncStatus] = useState('idle');
            const [showBorrowModal, setShowBorrowModal] = useState(false);
            const [zoomUrl, setZoomUrl] = useState(null);
            const [currentRow, setCurrentRow] = useState(0);
            const [reviewRows, setReviewRows] = useState([]);
            
            const fileInputRef = useRef(null);
            const saveTimeoutRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        await gapi.load('client', async () => {
                            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                        });
                    } catch (e) { console.error("GAPI Init Fail", e); }
                };
                init();
            }, []);

            const login = () => {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (res) => {
                        if (res.access_token) {
                            setToken(res.access_token);
                            bootSystem(res.access_token);
                        }
                    },
                });
                client.requestAccessToken();
            };

            const bootSystem = async (accessToken) => {
                setIsLoading(true);
                setLoadingMsg('Connecting to Master Library...');
                try {
                    // 1. Load Master Library once
                    const mList = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                    if (mList.result.files?.[0]) {
                        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${mList.result.files[0].id}?alt=media`, {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        });
                        const data = await res.json();
                        setMasterLibrary(data || {});
                    }
                    // 2. Load Stack Names only (Fast)
                    setLoadingMsg('Fetching Stack Names...');
                    const sList = await gapi.client.drive.files.list({ 
                        q: "mimeType = 'application/json' and name contains 'sweep_stack_'",
                        fields: "files(id, name)"
                    });
                    setStacks(sList.result.files || []);
                } catch (e) { console.error("Boot error", e); }
                setIsLoading(false);
            };

            const openStack = async (stack) => {
                setIsLoading(true);
                setLoadingMsg(`Opening ${stack.name}...`);
                try {
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${stack.id}?alt=media`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const ids = await res.json();
                    setActiveStack({ ...stack, cardIds: Array.isArray(ids) ? ids : [] });
                    setView('edit');
                } catch (e) { 
                    console.error("Open Stack Error", e);
                    setActiveStack({ ...stack, cardIds: [] });
                    setView('edit');
                }
                setIsLoading(false);
            };

            const saveMaster = async (nl) => {
                setSyncStatus('syncing');
                const mList = await gapi.client.drive.files.list({ q: "name = 'sweep_master_library.json'" });
                const mid = mList.result.files?.[0]?.id;
                const blob = new Blob([JSON.stringify(nl)], { type: 'application/json' });
                if (mid) {
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${mid}?uploadType=media`, {
                        method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                    });
                } else {
                    const meta = { name: 'sweep_master_library.json', mimeType: 'application/json' };
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                    form.append('file', blob);
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                    });
                }
                setSyncStatus('saved');
            };

            const saveStackFile = async (sid, ids) => {
                setSyncStatus('syncing');
                const blob = new Blob([JSON.stringify(ids)], { type: 'application/json' });
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${sid}?uploadType=media`, {
                    method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: blob
                });
                setSyncStatus('saved');
            };

            const updateCard = (cid, updates) => {
                const nl = { ...masterLibrary, [cid]: { ...masterLibrary[cid], ...updates } };
                setMasterLibrary(nl);
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                saveTimeoutRef.current = setTimeout(() => saveMaster(nl), 2000);
            };

            const addNewCard = () => {
                const id = "c_" + Date.now() + Math.random().toString(36).substr(2, 4);
                const nl = { ...masterLibrary, [id]: { id, header: '', description: '', image: null } };
                const ni = [...activeStack.cardIds, id];
                setMasterLibrary(nl);
                setActiveStack({...activeStack, cardIds: ni});
                saveMaster(nl);
                saveStackFile(activeStack.id, ni);
            };

            const startReview = () => {
                const rs = [];
                for (let i = 0; i < activeStack.cardIds.length; i += 3) rs.push(activeStack.cardIds.slice(i, i + 3));
                setReviewRows(rs); setCurrentRow(0); setView('review');
            };

            const swap = (ri, a, b) => {
                const nr = [...reviewRows]; const r = [...nr[ri]];
                [r[a], r[b]] = [r[b], r[a]]; nr[ri] = r; setReviewRows(nr);
            };

            const completeSweep = async () => {
                setSyncStatus('syncing');
                const a=[], b=[], c=[];
                reviewRows.forEach(r => { if(r[0]) a.push(r[0]); if(r[1]) b.push(r[1]); if(r[2]) c.push(r[2]); });
                const ni = [...a, ...b, ...c];
                await saveStackFile(activeStack.id, ni);
                setActiveStack({...activeStack, cardIds: ni});
                setView('edit');
            };

            const cleanName = (n) => n.replace('sweep_stack_', '').replace('.json', '');

            if (!token) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 text-center">
                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl max-w-sm mx-4">
                        <h1 className="text-4xl font-black text-indigo-600 mb-2 italic tracking-tighter">SWEEP_PRO</h1>
                        <p className="text-slate-400 mb-8 font-medium">Synced Global Cloud Studio</p>
                        <button onClick={login} className="w-full bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl">LOG IN TO DRIVE</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white p-10 text-center">
                    <div className="loading-spin mb-6"></div>
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{loadingMsg}</p>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 pb-40">
                    {/* ZOOM OVERLAY */}
                    {zoomUrl && (
                        <div className="fixed inset-0 z-[999] bg-black/95 flex items-center justify-center p-4" onClick={() => setZoomUrl(null)}>
                            <img src={zoomUrl} className="max-w-full max-h-full object-contain" />
                        </div>
                    )}

                    {/* TOP NAV */}
                    <nav className="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div className="flex items-center gap-4">
                            {view !== 'library' && (
                                <button onClick={() => setView('library')} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl font-bold hover:bg-slate-100">←</button>
                            )}
                            <div>
                                <h1 className="text-xl font-black text-indigo-600 uppercase italic leading-none">
                                    {view === 'library' ? 'Stacks Library' : cleanName(activeStack.name)}
                                </h1>
                                <p className="text-[9px] font-black text-slate-300 uppercase tracking-widest mt-1">
                                    {syncStatus === 'syncing' ? 'Syncing...' : 'Saved to Cloud'}
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            {view === 'library' ? (
                                <button onClick={() => {
                                    const n = prompt("New Stack Name:");
                                    if(n) { 
                                        const metadata = { name: `sweep_stack_${n}.json`, mimeType: 'application/json' };
                                        const blob = new Blob([JSON.stringify([])], { type: 'application/json' });
                                        const form = new FormData();
                                        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                                        form.append('file', blob);
                                        setIsLoading(true);
                                        fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                                            method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                                        }).then(() => bootSystem(token));
                                    }
                                }} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-xs">+ NEW</button>
                            ) : view === 'edit' ? (
                                <>
                                    <button onClick={() => setShowBorrowModal(true)} className="bg-emerald-500 text-white px-4 py-3 rounded-xl font-bold text-xs uppercase">Borrow</button>
                                    <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 text-white px-4 py-3 rounded-xl font-bold text-xs uppercase">Bulk</button>
                                    <button onClick={startReview} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase shadow-lg shadow-indigo-100">Review</button>
                                    <input type="file" multiple hidden ref={fileInputRef} onChange={(e) => {
                                        const fs = Array.from(e.target.files);
                                        setIsLoading(true); let p=0; let tl={...masterLibrary}; let ti=[...activeStack.cardIds];
                                        fs.
